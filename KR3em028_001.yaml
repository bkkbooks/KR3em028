body:
  text: 卷上白喉風張紹修曰白喉有時疫一症其發無時其傳染甚速其病至危至險治者多束手無策豫考之諸書臨症日久竊以為其治有十難焉蓋此症乃纏喉急痹緩治則死凡咽喉不利口渴舌燥頸腫目赤身痛唇紅皆上攻頭面之症邪客於心肺之間與他經無涉其有兼及他經者體氣虛弱邪氣乘虛而入皆後之傳變名曰越經時未傳及他經不察其源治以他經之藥其難一也大抵其症初起惡寒發熱頭痛背脹精神倦怠遍身骨節疼痛喉內有極痛者有微痛者初無形迹可見似傷風傷寒表症若投以麻桂羌活防風辛蘇之類致毒渙散無可挽回其難二也彼其惡寒發熱乃毒氣初作於內至二三日喉內見白見後寒熱自除或者不悟誤以為表藥有功豈知白見後即不服表藥而發熱亦止初起誤服麻桂非徒無益而又害之其難三也按此病熱症多寒症少有以色白為寒者不思此症初發於肺屬金其色白為五臟六腑之華蓋處至高之位毒氣熏蒸自下而上肺病日深故其本色白著治宜解五臟之毒使之下行勿令蓄積於肺若因色白疑為寒症投以桂附炮薑是猶抱薪救火愈熾愈烈其難四也即有知為火毒不敢輕用升提開散之品轍以芷硝大黃攻伐太過此症已傳至上焦氣分與中下焦無涉既上氣焦分受傷又以硝黃攻伐太過使中下焦有損元氣愈傷其難五也見症已確藥當守方有火毒甚者初起用消風敗毒引熱下行治法良是乃日服三兩劑而白不退連服十數劑而白愈加是猶杯水車薪與事無濟治者當詳審病源或舌苔黃黑喉干唇焦小便短澀而黃大便瀉泄帶黑是謂火毒凝結內病不除白能何淨愈發白愈守方久久投之自有效驗若另更別方必生變故其難六也察之既精圖治不容緩瘟疫變症殺人最速過七日即不起庸醫辨症未明投以平淡之劑不求有功但求免過是謂優容養姦逮至五六日毒氣重矣元氣傷矣善治者不得不以猛劑攻之然病已垂危成則無功一旦不起病家不咎優容之過反云猛劑非宜此非誤於後而實誤於前其難七也有非白喉而轉為白喉者初起喉紅腫痛或惡寒發熱或不惡寒發熱一邊腫名曰單蛾兩邊腫名曰雙蛾治之稍緩則氣閉不起宜用杜牛膝兜引熱下行大便閉結用大黃否則不必用此與白喉症異治同倘不預防轉為白喉為禍甚烈其難八也又有勞症白喉陰虛火燥痛極而水米難下漸至朽爛形容枯稿面目憔悴必須補劑使元氣充滿而喉痛自愈若以行疫症白喉誤認陰處差之毫釐失之千里其難九也更有一種白喉無惡寒發熱等症喉內起白皮隨落隨長的是寒症非桂附不愈即誤服消風敗毒之藥尚無損若以疫症白喉認為此症為害非淺其難十也知此十難臨審治余持此法十不失一難不終難也時疫流行而益不敢自祕非敢云濟世之良方亦足為刀圭之一助云爾又曰白喉症治法浩渺無竅余自稽考以來時深討論每臨篇得其法未見其病臨病見其症未必合其方可見病態多端惟貴圓通而知要耳豫曾立白喉症一篇以傳於世奈白喉之症愈出愈奇有早發而夕死者沿街合巷互相傳染治之不速十難全一噫真可慘也竊此症乃瘟疫惡症必須詳審外症細察脈情看明喉嚨內外兩關白多白少及大小厚薄方可下藥否則以輕劑而治重症其禍固烈以重劑而治輕病其害尤深過猶不及誠哉是言也其症初起憎寒壯熱口渴喉干聲音不出湯水不入痰涎壅塞脹閉疼痛異常滿口皆白脈來洪數甚者且無至數此乃時行厲氣為病喉中最急者也或者謂咽喉病忌用寒涼謬妄殊甚每見投以荊防敗毒散大承氣湯指不勝屈不知以硝黃瀉胃中之實熱是謂誅伐無過病遂乘之而危篤以羌防理太陽之遊風乃致渙散其毒病必漸入於膏盲余立除瘟化毒散神功辟邪散神仙活命湯已用之屢矣皆能立起沉疴但恐病勢太重猶嫌藥方藥力太輕再立龍虎二仙湯日服二三劑連服數日不必更方縱食不下咽斷不至寒涼過度胃氣告匱所謂有病則病受也白退而藥即止徐徐調理元氣不難充滿惟症尤烈者實火為患臟腑積熱太深堵塞咽喉隘地呼吸不通服雄黃解毒丸尤妙究系厲劑不可輕用慎之然所論雖屬詳明治者尤宜達變道權兼以閲歷方能隨手應效活人之法無出於此若輕忽急玩耽擱日期使面青唇黑氣急痰壅煩躁神昏攻之不可達之不及雖靈扁復生不可為也白喉風初起用葛根殭蠶蟬衣以散風熱以牛蒡子連翹銀花土茯苓消腫敗毒元參天冬麥冬生地清金水黃芩黃連生梔仁山豆根生石膏瀉火救火木通澤瀉車前子引熱下行薄荷射干散風消腫重者加馬勃龍膽草外用土牛膝兜或於末服藥之先既服藥之後煎水間服再以萬年青根汁或服或噙病已危急非針吐之法不能救急輕者以除瘟化毒散主之稍重者以神仙辟邪散或神仙活命湯主之輕則日服一二劑重則日服三四劑將疫毒由上焦引至中焦由中焦引至下焦從大小腸胱膀而出大便泄瀉火毒下行此為吉兆大便開塞少加熟大黃如仍開塞故用生軍大便通即去以白點退淨為度其藥味分量之加減劑數之多寡須臨症制宜不必另更別方連日投之自然全愈屢試屢驗同治丁卯冬日白喉險症極多有漸至危篤者延豫診治詢前所服之藥皆消風敗毒引熱下行之劑治法良是終莫能起不解何故豫詳審外症細察脈情再三之想必是實火為患熱毒凝結臟腑雖用瀉火敗毒之藥仍是杯水車薪於病矣濟擬一龍虎二仙湯日服四劑痊愈者有之有服二三十劑而白尚未退淨用雄黃解毒丸一服仍服未龍虛二仙湯十餘劑故遂處此方全活甚衆看白點退完當用清涼之品以清心條肺湯撤盡餘毒再用養陰之品脾胃素虛者用四君子湯加銀花總賴以圓機行活法也如遇牙關緊急不開閉而不能看症治以開關散即開又或初起之時及服藥之後痛不可忍神疲音啞急以針法按穴施之如喉內頸項腫甚以救急異功散傳之以上白喉治法除勞症白喉之外凡單蛾雙蛾喉癰及喉內紅腫均可依法治之但藥味須酌量加減慎之服藥後忌風吹又有辨症未明誤投升提開散滋補辛溫之劑視病之輕重以生緑豆研細末重者一茶碗輕者一酒杯冷水調服再酌用以後所列諸飲散煎出並煮大麥粥一碗先服粥後服藥則誤服之劑立除矣如痰涎湧甚用生桐油灌下用雞羽攪之嘔出痰涎須陸續灌盡五六兩方妙白喉嚨看法初起頭痛寒熱背脹遍身骨節疼痛或惡寒發熱或喉內極痛或微痛或不痛而喉內微硬有隨發而白隨見者有至二三日而白始見者或由白點白條白塊漸至滿喉皆白所治皆同服藥後喉內或白收緊或白稀疏或白微小或白轉黃久之必然退淨但此病非比他病貴在見機早尤貴在治者精若心粗氣浮輕視此症有非白喉而妄稱為白喉遽以猛藥攻之者有真白喉又不識為白喉僅以平劑投之者有胎産婦人幼孩老人大病後虛勞內傷皆難任攻伐者治不得當鮮有不輕者重重者危看喉內要將病人向光明處坐正或箸按住舌心細看喉嚨兩邊系白喉系單蛾雙蛾系風火喉看的方好下藥晚間則用油紙捻一照腦後一焰口內方看得明不可空腹入患家看病或飲雄黃酒一杯或食大蒜亦可保不傳染火症寒症看法火症白喉白塊浮於肉上起凸喉中紅腫飲食喜冷惡寒舌苔黃黑甚至大小便不通痛無已時如系寒症虛症則不紅不腫飲食惡冷喜熱天花板上紅絲數條即間有白塊亦陷於肉內凹而不凸大小便如平時喉中微痛或咽則痛不咽不痛不得以白喉之法治之不治之症服藥嘔吐不止七日滿白不退服藥大便不通未服藥大便瀉大便連瀉不止頷下發腫不消音啞無聲白塊自落喉干無涎天庭黑暗兩目直視面唇俱青角弓反張痰壅氣喘汗出如油手足厥冷牙關不開藥不能下方法雄黃解毒丸明雄二錢鬱金一錢巴豆肉三分共研細末用醋熬膏為丸如桐子大每用四分開水吞下小兒減半豫用均以大人四粒六粒按纏喉風走馬白喉風急症也緩治則危明雄破結去濕毒鬱金散惡血巴豆斬關奪隘能下惡涎下咽無有不活但此屬厲劑惡症用惡藥不得已而用之若非急症不可輕用耳龍虎二仙湯白喉風之極重者龍膽草二錢生地一兩元參四錢犀角四錢黃芩五錢黃連三錢生石羔一兩生梔子三錢牛蒡子四錢馬勃四錢生殭蠶五錢知母四錢板藍根四錢木通四錢粳米三兩大青菜五錢本方有甘草橄欖一味甜一味澀故去之按白喉風疫厲之症火毒之病不得重劑不能立見功效但犀角價貴量人家而用之除瘟化毒散白喉症初起及單雙蛾風火喉症葛根二錢浙貝三錢殭蠶二錢生地三錢蟬衣一錢山豆根一錢生梔仁二錢木通二錢黃芩二錢本方有甘草神功辟邪散白喉症稍重者葛根二錢浙貝三錢殭蠶三錢生地四錢牛蒡子三錢蟬衣一錢麥冬三錢連翹二錢黃芩二錢木通二錢銀花三錢馬勃二錢神傖活命湯白喉風日見重者龍膽草二錢浙貝三錢殭蠶三錢蟬衣一錢生石羔三錢生地四錢馬勃三錢黃芩三錢土茯苓五錢木通三錢銀花三錢車前子三錢回生萬應丹牛黃一錢鬱金四錢川連四錢兒茶五錢滴乳石五錢白芷二錢珍珠一錢青黛三錢薄荷七錢月石三錢血竭三錢黃柏三錢冰片一錢甘草三錢共研細末吹喉中治白喉單雙蛾喉痹喉癰纏喉風爛喉痧等症神效無比早年都門傳染喉症俗呼狼脖傷人最多各方皆不應效後得此方活人甚衆可為救世之實開關散番木鱉一個米醋碗底磨濃汁將筆蘸汁塗於兩邊牙齦至盡後之處漸開塗天花板上並舌根下即開藥汁切勿沾喉涎出以微溫水漱盡看症凡遇牙關緊以此法治之血竭硼散血竭三分甘草三錢元明粉一錢五分殭蠶一錢月石一兩兒茶三錢雄精三錢冰片一錢射香三分研極細末日吹三四次瓜霜散白喉風單雙蛾風火喉症頻吹之西瓜霜一兩辰砂二錢冰片一錢人中白一錢雄精二分共研細末將西瓜破開孔去淨瓤水以皮硝入內懸於當風以瓷盤在下接之水滴盤內結成冰塊及瓜外起霜掃下聽用豫查喉科指掌所載刮下之霜再入西瓜內再做二次其藥力更大石青散生石羔一兩人中白五錢青黛一兩辰砂一兩月石一兩膽凡五錢元明粉五錢山豆根三錢冰片五分研細末日吹三五次蚰蜒闢毒散蚰蜒闢條鹽梅二枚先將鹽梅肉刮下蚰蜒拌入少頃即化為水曬乾備用每遇各喉症以小塊含於口中取津先吐後咽或用水少許搗融以筆蘸塗白腐腫處即退蜘蛛救苦丹蜘蛛三個冰片五釐地蜘蛛生壕勘內土面上有蛛網拖出藏於網窠內身小而黑者是焙乾和冰片研細遇極險者吹之神效大有起死回生之功膽凡散膽凡一錢手指甲五分人中白五分膽凡假者不能破蛾化痰指甲炒黃共研細末喉蛾腫處連吹數次即破吐出惡血痰涎硇砂散硇砂二分青黛二分白礬二分研細末喉蛾腫痛吹之立破此藥真者難得不若膽凡散易於合成且功效相埒耳蒜泥拔毒散老蒜一片搗如泥以小豆大一粒敷經渠穴系大指伸直近手腕寸脈後有窩處即是男左女右起一水泡刺破揩淨毒水異效非常不可以為藥易而輕忽之也救急異功散血竭六分乳香六分去油斑蝥四錢全蠍六分冰片三分沒藥三分去油元參六分射香三分斑蝥去頭翅足以糯米炒黃去米共研細末每逢喉之險症內外漫腫咽喉將閉以小豆大一粒放小膏藥上距耳垂下半寸軟處貼上左腫貼左右腫貼右左右腫皆貼約五六時候起泡以針刺破出水揩淨毒水能消腫止疼清心滌肺湯白喉瘡咽中曰腐退淨火以下行用清涼撤盡餘毒生地三錢浙貝二錢黃芩二錢麥冬三錢知母二錢黃柏二錢花粉二錢天冬二錢殭蠶一錢甘草一錢煎服三四劑養正湯玉竹五錢熟地四錢山藥四錢生地五錢茯苓三錢花粉二錢麥冬二錢女貞子三錢首烏四錢白芍二錢水煎服二次銀花四君子湯首烏四錢人參五錢白朮四錢茯苓三錢炙草一錢銀花三錢桑葉二錢水煎服二次喉痹凡喉之症急者一二日未必發熱病尚輕緩若至第三日發者其病必重須問其大小便通與不通如二便通利症候雖大不過浮火上攻服消風散火之藥即愈如二便不通內必有實火非用降火解毒及通利二便之重藥其毒火從何而出病從何而解如頭痛兼傷寒難治凡喉症必俟大便去後方可望痊若大便閉結未可輕許凡喉之者重先將兩臂捋起至脈門後將及中指看中下節有紫筋現出為度以針刺紫筋出血立時可以飲食矣再看耳後左右有紫紅筋以刺出血為佳凡喉閉不刺血喉風不吐痰喉癰不放膿喉痹喉蛾不針烙治皆非法戴人云喉痹急症用針刺各穴道出血最為上策內經火鬱則發之謂發者乃發汗之一端也竇夢麟曰喉閉之症因外感寒邪內傷熱物或大寒後便入熱湯洗浴故將寒氣逼入脾經冷氣阻於中脘邪熱客於心經故生此疾痰涎壅盛卒然喉中閉塞氣不宣通死者多矣急用針刺手腕中紫筋上或少商穴出血即與雄黃解毒丸四五粒冷茶磨化灌之仍將冰片散吹喉中吐出風痰稠涎為妙風毒喉痹外赤腫內腫微紅帶白色其形似蒸餅連腮腫痛外症身惡寒而無熱腮頷浮腫牙關緊強此乃風痰相搏結塞喉間治法必以去痰為主吹藥吹之若外面腫紅用敷藥敷之中留一小孔再潤之以助藥力風熱喉痹其腫紅而微紫其形如拳其人面青而目上視外症壯熱惡寒儼若傷寒此病久積熱毒因而感風所致如病人聲音不響宜用潤肺之藥治之陰毒喉痹閉腫如紫李微現黑色或灰白色其色光血紅可治血黑不治外症惡寒其身瞤動腰痛腳冷此乃冬月感陰濕火邪相干也其血微紅及腫處軟喉中有痰可治血黑甚腫硬喉干難治先服化毒丹次以蘇子降氣湯再用吹藥一月之內戒酒傷寒喉痹乃傷寒遺毒不散致八九日後喉痹皆因熱毒入於心脾二經吹冰片散喉閉必先兩日胸膈氣緊出氣短促驀然喉痛手足厥冷氣閉命懸頃刻速用雞羽蘸桐油攪喉間探吐痰涎立開急將兩臂以手勒數十次至大拇指以針刺少商穴出血滴下其喉即通男左女右重者兩手皆刺各穴喉痹屬痰屬風屬熱皆因鬱火而兼熱毒腫甚不紅者及微白者乃喉嚨之虛症傷寒後發喉痹乳蛾難治為氣閉不通無形無勢其症喉項強硬目睛上視故多不治血壅而為痹宜紅藍花汁服之無鮮者則濃煎絞汁亦得或用茜草一兩煎服或用牛膝汁和醋服或用馬鞭草汁服或用射干煎汁含咽喉閉者先吐痰瓜蒂散雄黃化毒丹或以朴硝一兩細細含咽或用萊蔔汁服馮氏曰喉痹者即纏喉風類是也其喉面赤氣粗咽喉紅腫閉乃蓄熱生風積聚毒痰而作甚者內壅肉瘤一塊氣閉不通若至鼻面青黑寒熱頭低痰踞者不治更有臟寒亦能令人咽閉而吐吞不利者蓋諸症下寒過極則上熱反盛不獨此也其候與蛾症相症近而治法不能無異大抵無形腫閉者為痹有形腫痛者即是蛾耳先吐風痰者急則治其標也後解毒者緩則治其本也至於上熱下寒者用熱藥食前冷服不可誤服涼藥也經云一陰一陽結謂之喉痹一陰少陰君火也一陽少陽相火也手少陰心脈挾咽足少陰腎脈循喉嚨其人膈間素有痰涎或因飲食酒過度或因忿怒失常或因房室不節蓋飲酒過度胃火動也富貴之人多犯之忿怒失常肝火動也婦人多犯之房室不節腎火動也男人多犯之火動痰上而痰熱燔灼壅塞咽嗌之間痰者火之本火者痰之標火性急速所以內外腫痛陽水不入乃外症之最急者最危者治療之法急則治標緩則治本治標用丸散以吐痰散熱治本用湯藥以降火補虛奈何治者但云治脾肺火而未云降肝腎火也必須以內經從治之法切不可驟用寒涼益促其危耳故實火須用正治虛火須用從治須分明白不可少誤又曰咽與喉會厭與舌四門同在一門其用各異喉以納氣故喉氣通於天咽以納食故咽氣通於地會厭管於上以主開閣掩其氣喉令水穀能進食喉而不錯四者交相為用關一則飲食廢而死矣云喉痹者謂喉中呼吸不通言語不出而天氣閉塞也云咽痛及嗌痛者按咽之低處為嗌謂咽喉不能納唾與食而氣地氣閉也云喉痹咽嗌痛者謂咽喉諸病天地之氣並閉塞也又曰咽在後主食喉在前主氣十二經中惟足太陽主表別下項余經皆內循咽喉盡得以病之而統在君相二火喉主天氣厲肺金變動為燥燥則澀而閉咽主地氣屬脾土變動為濕濕則腫而脹皆火鬱上焦致痰涎氣血結聚咽喉腫達於外麻癢且痛為纏喉風腫於兩旁為喉痹其單蛾雙蛾木舌舌脹纏喉走馬喉風白喉風爛喉痧同於風火故不分也唯纏喉走馬殺人最速又曰喉痹多屬痰熱重者以桐油探吐纏喉亦屬痰熱謂其咽喉裡外皆腫者是也亦以桐油探又曰肺絶喉閉其脈浮散而微細其聲如鼾有如痰在喉中響者此肺絶之候宜用獨參湯調入竹瀝薑汁服之若早治之十全七八次則十全三四遲則十不救一查醫論選要曰臟腑停寒則氣縮如物窒礙於其間因有喉痹之症除症下虛令人喉痹又當治其下寒則痹自通矣夫走馬痹者謂喉痹急甚其死又速藥緩不及救也惟針法按各穴道針之可當一陳緊喉風亦是如此治法均急症也或問風毒喉痹內外皆腫其故何也風毒之氣結於喉間則壅塞不通乃風毒與痰相搏故也素問云無風則不動痰無痰則不受風風痰相搏結塞咽喉其外症咽喉形如雞子其色微白外而腮上有腫其形似瘡身發寒熱牙關緊強語聲不出者是也先用小刀刺破牙關腫處再針少商穴以及諸穴探吐痰涎又云風熱喉閉內外俱腫者謂其人久積熱毒因而感風風熱相搏發出外來則壅於喉間其人面赤腮腫身發寒熱喉中有塊如拳外血鮮紅治法同前又牙關緊強不得開者此皆風痰相搏壅塞咽喉或用醋調元明粉和水灌入喉內用雞羽探吐痰涎治如前外用五倍子研末醋調敷之虛陽上攻由病久元氣虛弱邪火上行咽喉腫痛上下不得升降水火不既濟心火上衝咽喉故腫痛而閉塞其形若何曰語聲不出牙關緊急痰涎滿口手足厥冷頭目昏眩治法同上以蘇子降氣湯治之喉痹厥重不省人事目張直視可用吳萸研末醋調塗兩足心然後用降氣湯治之氣喘加前胡烏藥氣短加沉香人參待手足溫飲薄粥以斂元氣入谷則昌絶谷則亡此之謂也又云如腮浮腫面赤者此必感於風毒用紫蘇楓葉柏枝煎湯洗之用荊防羌活以祛其風或用十宣散酒毒喉痹其形若雞子其腫鮮紅其光如鏡外症發熱惡寒頭疼項強此上焦積熱心脾受之蓋心脾二經主上焦故痰壅咽喉宜服鼠黏子湯吐痰針法同上用冰片散吹之風熱喉痹由於憂思勞碌太過或對風言語風入肺經作痰務多去痰為要其色鮮紅久而紫赤急用小刀刺破血微出火已瀉矣再服煎劑吹冰片散凡紫赤色變為淡紅色愈之漸也氣癰喉痹此症為因聚毒塞於喉間痰涎稠實發寒熱者仍分上中下三關毒在下關難治上中二關用吹藥吹喉中茶湯送下雄黃化毒五六粒量病之輕重酌用喉痹門蘇子降氣湯半夏陳皮肉桂前胡川朴當歸甘草蘇子生薑大棗祕傳奇方牆上壁錢七個內要活蟢蛛四五個捻作一團再用生明礬七分傾銀罐內化開將壁錢入凡內煅存性研細末吹入喉中立時就效雖將勢甚危亦復回生真祕法也二生散白礬雄黃共為細末吹入喉中吐出痰水立效神方喉痹喉風項腫均效殭蠶二兩蔥二把熏洗項間風熱即散又方蜜炙附子專治感寒咽閉不能下咽大附子一枚去皮切如錢厚浸蜜內炙黃再浸再炙愈炙愈妙切不可炙焦用一片含於口中咽津候甘味盡吐去日含三四次喉即開矣塞鼻方治喉痹乳蛾咽喉腫痛湯水不入命在須臾即用此法治之可以得生巴豆肉二粒細辛五釐搗和卷在紙中間成條剪斷如患在左即塞右鼻如患在右即塞左鼻右左均患兩鼻皆塞咽喉立通按喉痹雄黃化毒丹即雄黃解毒丸故附記之爛喉痧症辨程鏡宇云按陳耕道方法無一不是涼散兼施蓋深得夫表邪為末火熾為末之旨故立法有條不紊宜其發一百中驗效如神惟疫症之中或內有挾濕或暴寒宿痞蓄血或邪實正虛均為疫中常變之症探集前賢成法附後疫痧傳染而六氣八風不傳染何也緣六氣八風可知可避而疫則不可知不可聞而避也蓋六淫之氣本自太和而為歲氣司天浸淫過度此淫字之所以名也然天地間苟無此氣相推運行則生化收藏之道盈虛消長機乎息矣故岐伯謂六氣八風人當知避則是寒也人知其為冷暑也人知其為熱風濕燥火知其為風濕燥火是六淫之默運可驗而知矧八風之潛來莫知警避故雖嚴寒酷暑之盛行疾風暴雨之驟至氣似猛於時行而必無傳染之患良以此能知能避故也惟疫也不可知或歲值不承或天符不應或在泉所侮或司天獨勝其至也非時其形也無定雜賦六淫之內流行八風之中冒玄府而不知感呼吸而莫覺人在氣交之中蒙被氣化猶白之能採苟非堅實之質孰能涅而不淄以故彼染此傳如磁引鐵感其深淺發為重輕一夫抱疴四方風動易曰或繫之牛又曰邑人之災故能與時消息五類行災雖知之而已染且避之而盛傳矣可不畏哉天有非時之氣地有旱潦之偏上下相摩氤氳鼓蕩以致清陽不升濁陰不降蘊結於中曰瘟障散於外者曰瘴沉埋欲降而不降者謂之霾冒霧欲升而不得升者謂之霧是皆天地沴郁之氣漫無所泄感觸萬物役使行災謂之天行故其役於物也如天之使役是故謂之疫其厲於人也如雷之壯厲是故謂之厲其感也潛滋而暗長故積之也深其發也一泄而無遺故發之也暴而蒙其氣者則無論草木鳥獸百穀昆蟲凡神機氣立根外根中者莫不薰染及之故雞犬每斃於災癀禾稼亦傷于于蟊螣人染之則痧喉互發街巷盈村其肆瘧實烈於八風而傳染尤嚴乎六氣爰疫之中具有一義存焉疫痧時氣吸從口鼻併入太陰氣分者則爛喉併入陽明血分者則發痧太陰者肺臟也主喉而厲氣陽明者胃腑也主咽而屬肌肉喉通呼吸之氣行乎五臟咽為飲食之道六腑源頭故喉主天氣咽主地氣是以口鼻吸入咽喉傳導之肺胃交承之一臟一腑同受疫邪一氣一血各呈其象故爛喉者色多白病在肺而屬氣發痧色多赤病在胃而屬血其實同為一症一發於咽喉之地一達於肌肉之間移步以換形固形而名別耳故在肺則曰爛喉在胃則曰發痧故名曰爛喉痧毒邪傷形形因腫潰疫痧有之故曰疫中有毒疫者郁也即濁陰之地氣鬱結不散復投於人以為厲故又謂之疫也前賢吳又可葉天士悉以瘟疫統論而吳鞠通則又統為溫病名義未分而其實瘟者溫也乃司天溫熱之氣醞釀流行蘊於萬物以成災故謂之瘟也瘟病而不腫者乃本司天醞釀之溫熱氣疫痧而兼腫者實根濁陰鬱結之地氣疫毒濁瘟毒也一在氣一在血也經曰喉主天地咽主地氣天地者在氣則為清陽濁陰在人則為氣與血也故疫症之中有爛喉發痧之別者乃分人手之清陽濁陰與夫氣與血也人身手太陰主氣然其經實多氣多血故爛喉之中有紅爛白腐之二者乃少太陰之氣與血也人身足陽明主肌肉以其經氣血俱多故發痧之中有丹痧白疹之二者實陽明之氣與血也緣丹痧之中發系血為毒乾血即敗壞而變色於是肌膚漸腫露出痧點外呈即是疫毒之邪遊溢胃之經絡傳從血分達出譬猶他邪之從汗解緣他邪無毒得汗可解獨疫邪有毒而毒必災形故或癢或痛或爛或癍血分之毒盡透乃已又考麻痘二症麻發先天之陽毒痘發先天之陰毒雖發所當發然必借天行時氣以引之而後人身之毒方出天行者疫也由是以觀同氣相求疫能引發痘麻之毒則是疫中有毒不待明矣然則痧喉一症先天之毒雖無時行之毒必有症固不比於痘麻亦可借痘麻以譬之而痧實發乎疫毒也又明矣爛喉與痧乃氣血同病內外異形之故而云間朱鐵山獨創痧本喉末之論是不知氣血之形當有別耳其論謂痧邪之發必先見咽喉腫痛是厲邪痧子為本咽喉咳嗽為末而諸醫偏重於咽喉而忽於痧子捨本求末執守內經諸痛屬火紅腫為熱之説急進寒涼遏伏厲邪以致體弱者病勢轉重而醫猶謂病重藥輕寒涼倍進痧毒內陷喉閉疫升命歸泉路要知頭面腫赤乃痧毒外達之勢正當表散開達毒自不留直待腫退痧回鼻流清涕方進涼血清解靡不速效按鐵山初宜表散繼宜涼血之論誠可謂知所先後矣若以發痧為本而宜散爛喉為末而宜涼則是疫有二邪一病兩治緣痧邪之發氣血有分形痧喉無本末治之之法皆當一本於痧均要先解後涼抑或涼解雙用斷不能以痧為本而宜散以喉為末而宜涼也至內經諸痛屬火紅腫為熱二語諸醫執論痧喉何嘗不是經又曰火鬱發之諸醫若更執此以治疫則於痧喉一症當無剩義是內經之旨本詳明而領經之趣則自晦非執之咎實執而不化之咎若陳耕道疫痧方中所論表邪末也火熾本也二語確是深明本末之理而吾姻洪麗川當謂痧喉一症名雖兩殊實則一病分呈乎內外耳玩味斯言真一語道破推而治疫得其旨矣疫痧一症不外熱毒二氣互結而成熟為火之餘故熱勝則腫毒為穢之積故毒勝災膚然熱非清涼不解而毒非芳香不除即以清涼解毒芳香逐穢八字為治疫要領再視其氣血重輕隨症通變而治疫之法要不出此八字範圍至推拿針刺其法最古大旨多為痹症而設痹者氣機阻閉不得流通之謂也針之耴義如以管入水閉其上則下不出旁穿一隙則水自泄故人病痹不通即刺以經穴以通其氣推拿毛竅以疏其氣非謂針刺可泄毒邪也蓋毒既入於經豈一針之微遂能使毒泄出故針法有補有瀉若陰虛火旺血不營經而為阻痹或寒凝經絡而為痛痹針之即所以瀉其氣而使通又恐經氣過泄故又以針補而閉之若病非痹症可毋庸多用針刺徒傷經絡是以素問謂升降出入無器不有出入閉則生機化息故針之用在乎通而非所以泄毒也痧喉症不挾風寒外遏者只宜疏託外達忌用溫燥發表蓋疫為陽邪而發散大都陽藥動則胃津腎液被劫消亡若無結胸內陷症者只宜甘涼泄熱忌用若寒消導往往痧勢將達反為寒涼遏伏故葉天士以發散消導為疫家大戒意旨良深竊謂疫根於熱雖曰口鼻吸受肺胃感邪然以類相從君相二火亦當內應故每直布三焦逆傳脆絡則邪在裡而不在表使以燥劑表之是重虛其表而反實其里勢將逼成內陷若從玄府染受者受者未經營衛病在表而不在裡使以下劑導之則裡氣愈虛表邪愈實亦將引邪內陷故發散消導均有貽誤嘗考諸家論説每謂初失之表誤用寒涼將邪遏伏確論名言實有見地第恐拘過之輩不察表裡之由不分病勢輕重視寒涼為畏途奉發散為圭臬成見實足貽害故虞山陳耕道謂治疫之要當於一發之時見其勢之順逆宜散宜涼一決無誤斯為老眼此論誠有膽識濁折其衷故將前賢二説引而伸之以明用藥之方重者勿拘成格臟腑之質有勝有偏呼吸之司氣無二息若肺氣實而胃氣虛者胃腑受邪宜發痧而不爛喉若肺氣虛而胃氣實者肺臟感疫宜爛喉而不發痧何以發痧者每不爛喉爛喉者多兼發痧緑肺主呼吸聲息飲食與胃相依況肺脈起於中焦下絡胃之上口賁門之地肺家既見爛喉喉毒隨吸入胃胃家吸受肺毒是以必兼發痧縱輕微不覺必膚養依稀此爛喉無不發痧者以此又內經曰陽病者上行極而下是以肺病胃正上行極而下也順也胃病不害於肺者乃疫為陽邪不應下行極而上也亦順也故發痧每不爛喉爛喉多兼發痧者又以此也爛喉治肺固當然矣然宜防範及胃其故有二內經曰喉者前其形堅健咽在後其質和柔前後雖有區分然在懸雍以下會厭之間分氣食二管爛處乃是咽喉交互之所肺胃未判之區安可治肺略胃此胃之不可偏廢者一也又以咽喉呼吸聲息飲食與胃依隨如影之從形更宜防範胃家此胃之不可偏廢二也故曰治喉防範胃即是上二治未病痧之順逆大都先發胸背而後四肢者順先自頭面而後腿足者亦順而痧之色要在紅勻不在多寡如鮮紅細碎著手有痕者吉周遍均勻肌膚作癢者亦吉徐徐緩達從里透出者亦吉凡此之類雖多如雲錦亦不為凶若驟如紅紙者為胃熱極盛包紫且黑者熱毒灼動陰血全黑者胃爛不治然黑而暗亮者必在氣血充足之人亟進涼血泄熱間有一二挽回惟黑而暗者必死若痧雖黑四邊隱隱帶赤色者為火鬱內伏大用涼血解毒尚冀轉紅可治若驟形滅沒神色昏迷者為內陷肌膚作癢者營衛猶和膚燥無汗者毒灼液干難於透達痧透後點上白泡纍纍者並非痧疹豆發乃是熱毒極盛猶不足以盡其毒故點上再加白泡泡大而有漿者多凶痧後遺毒發於腮項者難治汗後痧隱者險四肢浮腫而亮者多敗十日之間喉中小粒其色多白者乃邪發於太陰氣分者故俗有時喉肺白爛之名若素有伏寒或挾濕邪者爛痕亦多白色太都白為肺金本色無系重輕若白而且腐狀如粉皮者乃氣分大傷為難治若白爛喉展開穿及鼻孔者俗名天白蟻難治若色現鮮紅及紅點者乃疫於太陰血分吹藥多涎者熱雖盛而液尚未傷易治若吹藥而涎不生者津液大虧難治若痧透後而爛喉尤甚者為外毒雖鬆內毒尚猛屬險症若喉內爛而外腫且堅者為毒結喉間無從發泄雖治若爛至喉底不見好肉者為敗衆多斃於五日之內爛喉而噴嚏者肺機開泄為吉厄逆者毒火上逆為凶嗆然而咳者毒火上攻射其肺係為險頻聲而咳者邪襲肺經為吉爛喉而不咳嗽者為險失音者肺熱葉焦氣促者熱盛灼金痧症面腫目赤者以疫為陽邪而頭為諸陽之會以陽重陽故頭目多見赤腫而吳又可溫疫論謂腫是兼有水腫而發又謂里邪失下表裡氣滯而然按此二症或亦有之而疫之腫乃內經熱勝則腫之腫雖無兼症亦應見腫痧之脈宜弦數有序忌軟弱無序若況而伏者為邪未達出宜進疏託數大而空虛者為正弱邪勝宜勿傷正氣陽症見陰脈者難治面色紅而亮者為火盛青而滯者為毒盛內伏㿠白而呆者為風伏寒邪青黯而喉不爛或不甚爛者為素伏濕邪治之之法在寒濕附及者治𠫵辛熱濕熱附及者治用辛涼鼻煤者乃胃脈起于山根胃熱極而根源應之故煤鼻紅而扇者乃鼻為肺竅肺胃之氣均為熱傷正氣不支而欲絶初起一團黑色繞於鼻間者乃胃家伏毒已甚鼻衄者乃胃脈下挾鼻孔胃熱湧血上行溢從鼻竅而出舌苔灰而賦者為濕熱上騰邪未化火純白而膩者為素挾寒邪均宜疏達舌赤多刺者為邪已化火宜清化舌絳中黑者為津液虧耗宜救液舌白中絳者為外束寒邪宜雙解舌絳且縮者為熱陷心營宜育陰舌苔黃厚者為熱將解宜清胃熱唇絳者乃陽明之脈環於唇為胃液虧唇紫而裂者為胃液涸宜救液譫語者為邪陷心胞不譫語而鼾睡迷悶喉有痰聲者為毒霧濛開清宮最防內陷嘔惡者藉泄胃熱為吉欲吐不吐干惡神呆者為胃邪將犯心營便閉者胃有燥糞為火結腹痛者最忌為悶痧惡寒者為外邪侵衛惡寒而後熱者乃邪既入衛則隨衛氣以出入遂常熱而不復惡寒治之之法要乘其未熱之先或寒熱交作之際疏而達之攔其入營之路有汗者心液足為吉無汗者心液虧防內陷足無汗者乃疫為陽病陽病之情應由上行極而下邪未及於足陰故足應無汗非關汗出不遍也便溏而色黝者以大腸為肺之表乃邪從表泄正是解機若黑亮有光黏稠如漆者乃熱極旁流反為不美蓋疫毒之邪內干臟腑在正氣盛旺之人則邪流腸腑從便而泄腑毒即可驅除若症虛邪實之人則邪布三焦滯留腸胃劫動陰血化腐脂膏侵無所泄溢從地道旁流而出形似瘀血凝結而成不堪其臭有象之邪雖泄無形之毒方張莫謂蔻去城空乃是盈中溢外亟用重濟清化以淨臟腑之邪未可再事狐疑誤認邪從表泄是熱極旁流一症生死一大關鍵幸勿忽諸爛喉而口鼻者有牙疳穿腮等症其氣皆發於口中非從喉內達出若無牙疳各症而臭穢之氣逼人從喉間達出者為肺胃化腐之機蓋迹雖未形而機則已露爛喉之消息系乎口臭之重輕不徒喉爛之深淺若使一聞此氣無論爛與不爛亟進清涼化毒治其未病斯謂上工口為脾之竅胃為脾之表而胃之脈起鼻上額挾口循頰故胃熱極而上騰則口唇糜腫芒刺有濃色紅者疫熱雖盛未入陰營色紫或黑者陰血已動乃為險然較之口鼻症屬略輕若僅口糜而色紫黑者尚非絶症第口鼻盡有不口糜而口糜斷無不口臭分別之處一自口中呼出一僅唇外難聞法以上用輕宣下清胃熱因勢利導之上下兼賅方無遺漏齒乃腎之餘齦為胃之絡胃陰灼耗則腎水之源難於既濟而中之火應震為雷胃液腎津源根一派齦牙唇齒脈絡貫通故胃陽血動則齦中血色黃如敗醬胃熱極盛則齒燥如石而有光腎陰血動則齦中血瓣紫如黑漆腎液耗干則齒枯如骨而無彩甚至齒黑忽然脫落抑或穿腮牙疳均為極險之症亟用下奪之方以潛龍雷之火不使腎液煎枯庶免陰從下竭更𠫵育陰之劑以冀赤地流膏勿令胃液消亡致使陽從上厥時行疫氣非風不傳故列子謂風為大塊之噎氣雖陰霾不開之氣一遇風鼓蕩之即從其化而為陽矣故疫屬陽邪而陽淫熱疾初感在表雖屬惡寒然邪之來本於火熱此雙解之涼散兼施者一也至惡寒之故乃風傷於衛熱傷於氣故衛氣不敵而退縮邪即勝之而寒作矣陽邪鼓動最速既侵衛分旋隨衛氣以相出入又從衛化而為熱所病原者於衛本無損於陰營然久戀衛而不祛將風勝則動熱勝則腫於是陽亢陰消陰亦灼耗而營傷矣所以疏達養陰不能偏廢此雙解法之所以當施者二也又若初起神呆痧點隱約燥熱爛喉來勢猛烈者當此之際使認症不清而以小劑嘗試直是優柔養姦必致釀成巨患譬之車薪杯水適以增焰何能止炎若僅以苦寒從事不加雙解則是不通風火之情激成燎原之勢勢必猛烈猶甚氣焰愈增推疫之氣從風從火風火相生變端甚速然風之惟性宜疏而火之情尚達所以涼劑中必兼疏達也以此蓋寒涼之性非下即閉適與疏達相反實是拂其情性何怪電掣風馳激之生變假如醋暑大熱赤日懸空雖驟雨而無風不但氣不轉涼而反因之加熱正是熱為雨遏熱氣何得而宣但有微風疏動燥氣便覺消除使再加雨潤之即轉太和氣象此雙解之所以富施尤貴重施者三也時行疫氣雖易染人未盡見人而染何也自召之也召之何由由夫人之氣質素弱藩籬又疏於是疫從口鼻而傳痧自肌膚而染者謂之傳染抑人正氣雖足而或外伏他邪則是素有伏邪更感時行而發者謂之感發更有外強中乾雖身無伏邪而賦質偏勝則是氣有所偏疫乘其偏而胃冒受者謂之感冒必也正氣內充更無夙疾少神志之煩絶勞頓之役不傳不染其殆庶幾岐伯曰不相染者正氣存內邪不可干是疫之入也必乘其虛然虛有內外故感有淺深氣有偏勝故症有疑似其在內氣實而外氣虛者雖感冒輕微亦應見微病故認症難真辨之之法惟咳嗽膚癢脈象弦而帶數隱約痧形在所必見其襲於皮毛者則內應乎肺故目赤者以白珠屬肺膚癢者以肺主皮毛喉痛者以喉為肺管溏泄者以大腸為肺之表邪從表泄咳嗽者為邪襲肺經是皆皮毛冒疫其象如此抑有皮毛閉密邪不能侵而困乏或其身四肢感冒者則內應乎脾而脾與胃又相為表裡故肢癢者以脾主四肢液乾者為脾不輸津化作渴者為胃熱思飲嘔惡者為胃邪上越不思飲食者為邪襲胃經不寐者為胃為燥屎發痧者為邪達肌表是皆因正氣內充外冒疫邪而不能循經入內者其象又如此均為疑似之症最為誤作他邪故特為之辨別以明似是之非痧之一症昔人概以斑疹麻疹目之獨麻一症系發先天之陽毒外此則大塊者如斑者曰癍細織如錦者曰疹黍粒如沙者曰痧而其實白疹發胃陽之邪丹痧泄胃陰之毒陰陽赤白雖有區分癍疹痧麻悉歸胃腑故古人一概統論不分痧目科條吳又可則混於溫葉天士吳鞠通悉敘於溫病而時賢更於痧之中別出紅痧喉痧悶痧風痧瘄子疹子等用名目不一其義則同前論已詳言之矣乃若風痧等類譬猶強弩之末氣勢雖微中人亦厲有不咳嗽不發熱不過喉間微痛皮膚作癢而已邪本輕微人多輕忽苟忽之將釀成悶痧難於救藥其故以人既干邪則腠理常開衛氣漸弛而正弱正氣既弱則口鼻呼吸尤易內傳況復身中伏疫即從腠理而循經隧由經隧而干臟腑內外響應其勢甚速星星之火可以燎原故古人常謂禍忽於隱微病生於不覺誡人防其漸也至於悶痧形狀亦不過微惡寒熱痧點依稀狀與風痧相似獨神昏鼾睡面黯身清則大異於風痧良由感疫極深體弱難任無力發出或加他邪再束或為涼藥誤投悶閉於中發泄不出勢成內陷而死故曰悶痧俗有發痧一症即由所謂暑月中惡陰凝腹痛之痞氣也既非傳染復非疫厲俗曰脹痧烏痧釣腳痧絞腸痧等症與疫相反而俗亦謂之痧者尤當附以辨明蓋疫痧者傳染時行而發陰痧者卒中惡氣而然惡氣者何即矢氣也矢氣者乃濁穢所積雜挾陰邪感人之身如矢中的其氣陰凝故不傳染爰盛夏之時亦陽盡發於外六陰盡藏於內故夏氣升而井水寒人身應乎天地臟腑應屬寒涼藩籬因而不密以故陰邪易干矢氣易入入則直射貫革痛楚難勝若無伏邪而感者立致容顏慘黯腹痛腸鳴閉阻氣機四肢厥冷只須推拿揉刮使血氣頻分頻合陽氣疏通矢氣遂從肌肉傳達而出漸露痧外呈勿藥亦可自愈然須一周日不能飲水飲則邪留經絡一遇寒涼憤郁最易舉發不可不知若有伏邪而更干矢氣則宜射腸腑立致血脈凝泣營衛失司霍亂吐瀉釣腳絞腸痛不可耐厥逆身僵人事不省亟以辛熱之品逐其凝寒芳香靈明之藥導其關竅俾氣血流暢陽和頰開立可立愈故無論輕重而腹痛腸鳴者在所不免良以腹內寒涼復襲矢氣於是腹為寒凝而疼痛腸即阻結而如絞此絞腸之所以名也至於釣腳乃足為三陰脈絡發源之所陰從下受故傷陰絡凝泣腳不能伸而為釣救之不及命斃須臾是皆中惡腹痛痞氣陰凝之症俗雖謂之發痧實與疫痧之痧有異即傳染與不傳染所由分也一爛喉痧症咽喉不甚腫痛初起時身現微紅似有似無之狀脈伏肢涼麵青唇紫口閉流涎目睛直視指甲青滯胸腹飽脹氣促神昏四肢搐抽等症此悶痧也雖百無一生亦不忍坐視其斃速用臥龍丹多吹兩鼻多嚏為吉隨用薄荷錢許煎湯磨紫金錠二枚頻灌之候形色少轉再進煎劑如無以上諸搬閉象不宜輕用吹嚏辛燥之藥喉痧症初起色紫而豔來勢甚猛即用瘍醫大全痧疹論中方歸尾紫草桃仁蒲黃地丁等藥𠫵酌出之頗能見效悶痧一症多有臥龍丹難開其閉者故特以棗塞鼻隨息出入開喉起閉一方於最後以補缺略試無不效功異回生幸勿輕視一喉痧症無論已暢未暢之時若咽喉痛腫不堪形色紫豔尚未潰爛或已破未深而項外漫腫堅硬痰氣壅閉湯水難下者急用喉針在喉之兩旁高腫處刺入分許二三下咯去黑紫毒血隨時便可下藥亦不致於大潰刺喉痧用針刺兩手大指內側爪甲根分許即少商穴也刺入分許擠盡紫血最能開泄肺經熱毒喉痧內外不甚腫痛可進湯水不甚腫痛色淡不豔潰爛過深皆不必刺如脈細神昏毒已內陷亦不必刺喉痧嘔吐肢涼皆緣陽明疫邪壅閉以致腠理不開氣結不舒不可作寒症治之以投辛溫如蒼朮厚朴半夏肉桂附子生薑之類又初見痧形似有似無驟然驚搐者亦不宜用若寒鎮驚之藥如牛黃蘇合等丸此但透達痧疹得暢自能漸愈如喉已潰爛芫荽觀音柳棉線紗櫻桃核一切忌用即不潰爛疫痧溫熱均不相宜疫痧爛喉症犀角地黃湯一方須審定而後用書中雖未載明臨症務宜斟酌用疏達法痧邪在表火不內熾痧熱稀輕神清喉不爛者為先達後清之法葛根湯治身熱神清痧隱稀疏舌白脈鬱而喉不甚爛者宜之葛根牛蒡荊芥蟬衣連翹鬱金甘草桔梗加減桔根湯治無汗痧隱舌白脈郁喉爛不甚者葛根牛蒡香豉枳殼薄荷馬勃蟬衣荊芥防風連翹焦查赤芍甘草香豉飲治痧隱脈郁喉腐舌燥症雖乍起津液不足神雖清爽邪火內伏者宜之香豉牛蒡荊芥桔梗連翹梔子馬勃大貝人中黃共三方清散法疫痧重者疏散清化宜並進也表邪未除疏散固不可少疫毒內熾清化更不可遲表邪末也火熾本也症雖乍起而灼熱無汗痧隱成片喉爛神煩是火熾已也甚若仍泥於無汗痧隱而必一味疏達恐愈疏而汗愈無痧愈隱矣愈達而神愈昏喉愈爛矣不顧治本之火而徒治表之邪捨本求末焉能奏效故立清散一門表本兼賅邪火併治如常山蛇擊首應尾能處洞然葛根湯治灼熱神昏煩躁喉腐脈弦痧隱成片不分顆粒無汗舌垢者宜之犀角葛根牛蒡桔梗連翹山梔蟬衣荊芥馬勃查炭人中黃犀豉湯治爛喉痧隱脈弦神昏煩躁熱甚汗少舌絳口渴症雖乍起而疫火燎原有內陷之勢神昏甚者兼用萬氏牛黃丸犀角香豉牛子荊芥連翹山梔馬勃大貝蟬衣赤芍桔梗甘草共二方清化法疫痧之火迅而烈清化之劑不可緩尤不可輕若表邪未解內火已熾須見於疫火未肆之前而先化其毒故散必兼清若毒焰已熾則是冠發捕奏功難效矣倘表邪已解火熾方盛痧透脈弦喉爛舌絳口渴神煩此時清化不重用正如杯水救車薪決其無效犀角地黃湯治痧點已透火灼液虧脈弦數大喉爛舌絳者宜之如火灼液虧舌絳喉爛即痧未透發疏達品中亦宜加之此湯乃化毒救液之妙劑犀角地黃丹皮赤芍犀角二鮮湯治痧點雖透而喉爛極甚脈弦大而口渴神煩舌絳唇乾火熾液涸者宜之犀角連翹大貝元參山梔羚羊角鮮生地鮮沙參人中黃人中白銀花生石羔川黃連馬勃陳金汁奪命飲治痰極盛津液乾涸舌絳口渴神煩喉爛脈象弦大痧點云密者宜之川連石羔犀角生地丹皮赤芍青黛馬勃大貝連翹元參金汁羚羊沙參人中黃清肺飲治痧點已透喉爛漸輕神爽熱淡而咳嗽者未平者宜之桑葉沙參羚羊連翹桔梗甘草橘紅貝母共四方下奪之劑不得已而為之也表邪未解內火已熾可以助疏達之品而為斬關之將者雙解散是也表邪已解火熾猶甚可以佐清化之品而有奪門之能者四虎飲是也重劑可施於正強邪實之人正強邪實而表邪未解者必無汗痧隱喉爛神煩便閉脈實施之雙解不亦宜乎表邪既解者必得汗痧密喉爛神燥脈實便閉進以四虎飲不亦宜乎此重劑之所為不得已而設也雙解散治痧點隱約喉爛氣穢神煩便閉目赤脈實病勢初起正強邪實者宜之大黃芒硝葛根牛蒡荊芥連翹薄荷蟬衣枳殼人中黃桔梗四虎飲治痧雖透而爛喉極甚脈象弦數目赤便閉神煩舌絳痰火甚者宜之大黃黃連犀角石羔知母元參生地青黛馬勃共二方救液是佐使之一法火盛液虧者必需之疫痧不離乎火火甚者液必虧病必危救液之品化其毒於恬淡之中養其陰於未涸之候佐疏達之品不嫌其凝寒佐清化之方無憂其液涸救液之劑曷可緩哉五鮮飲治舌絳而干脈弦數大痧隱而喉腐不甚者可與葛根湯並服痧隱而喉爛者可與犀豉齊進鮮沙參鮮生地鮮茅根鮮蘆根甘蔗汁育陰煎治痧透肌燥舌絳液干喉爛便閉脈弦無神者宜之元武板鱉甲生地丹皮大貝金汁麥冬知母沙參花粉元參犀角共二方吹喉十寶丹專治爛喉症無論已潰未潰腫色豔生並治痘毒以及痧疹後牙疳楊梅後毒結咽喉功能消腫止痛化毒生肌仙方也其效如神萬勿增減牛黃三分大貝三分人中白煅五分琥珀五分青魚膽五分大者珍珠六分梅片五釐人指甲四分馬勃三分硼砂四分共研極細末專治此症其他喉科谷症自有喉科吹藥未可概用之敷項頸方即時毒門中二味拔毒散雄黃生凡專治痧疹後毒結項外溫腫堅硬無論其色紅白效驗如神專敷項外漫腫名紫金丹即尿池中多年碎磚炭火煅紅入醋中泡再煅再泡五六次取研末每兩入射香一分用醋白蜜各半熬滾調敷如塌皮形色紫豔用菜油加蛋清之喉風纏喉項腫者均可用鮮土牛膝根搗汁燉溫時飲並治一切喉症消腫散因止痛化痰如神驅瘟辟邪法生軍二兩茵陳一兩茅朮五錢降香一兩研末不時燒熏之惟病人臥室不能用恐防嗆喉喉閉塞鼻方專治喉閉湯水不入將藥納棗塞鼻中使藥氣隨鼻息而入喉關乃開惟藥性燥烈不可著肉敷點用紅棗切破一頭去核將藥少許納入棗中線扎封棗口左痛塞右鼻右痛塞左鼻若小孩鼻孔小棗不能塞或用棉花包扎塞亦可但不能令藥貼靠著肉以免腫泡之患若喉閉勢重者用雙棗兩鼻齊塞亦可此方不但用之痧喉喉閉一症即凡傷寒各種喉閉氣息不通命在垂危多具起死回生之力神妙異常勿輕視蟾酥七分細辛四分辰砂三分射香二分五釐冰片二分半牙皂四分生半夏三分辛夷四分剛子即巴豆四分去油牛黃二分雄黃四分共研細末收貯喉閉一症氣機阻閉藥不能下咽命在垂危雖良醫亦無策往往為閉所絶縱臥龍丹紫金丹開關各法不克得一噴嚏者百無一生此方合藥塞入鼻內只要膺前猶覺跳動氣息雖極細微但得一絲未絶無不痰氣漸鬆人事轉醒有經數時而蘇者有周晝夜而起者神效良方人中白散專治男婦大小口舌糜爛走馬牙疳並咽喉腫痛牙床腐潰等症青黛一錢月石一錢兒茶一錢薄荷五分梅片二分人中白一錢元明粉五分西黃三分珍珠五分共研細末搽患處牙疳神方治痧疹走馬牙疳先用冬青葉煎水漱淨再以此藥敷上青黛一錢牛黃二分人中白一錢煆回龍骨一錢煆血餘炭一錢冰片三分珍珠五分舊紅氈子炭一錢小紅棗七枚去核入雄黃少許煆共研細末收好勿泄氣按前焦疫痧方乃為疫痧爛喉專症而設並無雜挾他邪並挾寒挾濕均為疫症之常爰採朱鐵山數方補其闕略鐵山所論謂當察其發熱之始時令寒暄酌而治用倘嚴寒是挾雖桂枝葛根麻黃亦均可用勿以辛溫而遲疑此言誠非墨守經曰必先歲氣母伐天和其斯之謂故其方中有升麻白芷蒼朮柴胡各禁藥雖悖治疫之旨然疫中繫有是症故雖在禁而不得以禁之特為録出以備一格聊為神而明之之用荊防葛根湯治風寒外來皮膚閉密痧疹逡巡不出又治形寒乍熱咽喉腫痛咳嗽胸悶鼻塞嘔惡兩目汪汪手足指冷脈來濡數或現浮數宜服此湯荊芥一錢五分防風一錢五分甘草四分桔梗一錢五分牛蒡三錢蟬衣一錢枳殼一錢象貝一錢五分葛根一錢五分杏仁三錢便溏勿用升麻葛根湯治體質弱痧不透達升麻一錢葛根一錢赤芍八分甘草四分加減透邪湯治痧不透達服升麻葛根湯仍不達再服此湯升麻一錢當歸一錢五分荊芥一錢五分防風一錢五分白芍一錢五分蟬衣四錢牛蒡三錢甘草四分加減託里舉癍湯服透邪湯後痧仍不達再服此湯升麻一錢柴胡一錢當歸二錢白芍一錢酒炒白芷一錢炙山甲一錢五分浮萍痧隱不達或達而後沒服前方托之用芫荽兩許酒水煎以苧麻根蘸酒撲擦熏之亦可時喉白爛吹藥西黃二分珍珠六分琥珀五分青黛八分壁錢五個指甲五分象牙屑八分馬勃三分冰片一分共研末凡遇喉症均可吹得
