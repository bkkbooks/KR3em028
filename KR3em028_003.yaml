body:
  text: 卷下咽痛陳實功曰咽喉雖屬於肺然所致各有不同有虛火實火之分紫喉漫喉之説咽為心肺肝腎呼吸之門飲食聲音出納之道此關係一身害人迅速虛火色淡微腫脈亦細微小便清白大便自利此乃思慮過多中氣不足脾氣不能中獲虛火易於上炎咽嗌乾燥飲食妨礙咳吐痰涎呼吸不利斑生苔蘚纍若蝦蟆皮有如茅草常刺喉中又如硬物嗌於咽下嘔吐酸水噦出甜涎甚則苔上白色唇生礬色聲音雌啞氣喘多痰以上現症皆出於虛火元氣不足中來治此不可誤用寒涼上午痛者屬氣虛補中益氣湯加麥冬五味牛蒡元參午後痛者屬陰虛四物湯加知母桔梗元參黃柏如服不效必加薑附以為引導即佐治之法也實火者醇酒辛烈熱積於中久則火動痰生髮為咽腫甚則風痰上壅咽喉閉塞少頃湯水不入聲音不出此為喉痹緊喉風是也用藥不及先用針刺喉間發泄毒血隨用雞羽蘸桐油探吐稠痰務使痰毒出盡咽門得松湯藥可入語聲得出乃止內服清咽利膈湯疏利餘毒牙關緊閉難入必當先刺少商穴出血其閉自開如針刺無血刺出黃水探吐無痰聲如拽鋸鼻掀痰喘湯水不下語聲不出真死候也不治岐天師曰如虛火沸騰於咽喉口齒之間用寒涼之藥入口稍快少頃又甚又用寒涼腹瀉肚痛而上熱益熾欲用熱藥涼飲而病人不信不肯輕治乃用外治之法引之而愈方用附子一個為末醋調成膏貼在湧泉穴上少頃火氣衰又少頃而熱止退變成冰涼世界然後以六味地黃大劑與之則火不再沸騰蓋此火乃雷火見水則愈酷烈子不見雷霆之震濃陰大雨之時愈加震動驚天轟地更作威勢一見太陽當空則雨歇聲消寂然不聞又不見冬令之天地耶嚴寒霜雪冰凍郊原雨雪霏霏陰雨慘厲此天氣下行而地氣反上升蓋下勢則上自寒也又不見夏日之天地乎酷曰炎蒸蘊隆火熱爍木焚林燔湯沸水天氣上升地氣下降此上熱而下寒也人身虛火亦猶是也今既火騰於上則下自冰冷今以附子大熱之藥湧泉引之者蓋湧泉雖是水穴水之中實有火氣存焉火性炎上而穴中正寒忽然得火則水自沸溫水溫則火自降同氣相交必歸於窟宅之中矣火既歸於窟宅又何至沸騰於天上哉此咽喉口齒之火忽然消除有不知其然而然之妙此引治之巧又當知之者此即外施引火歸原之法也馮魯瞻曰咽喉者一身之捴要水穀出入之道路也若胸膈之間蘊結熱毒致生風痰壅滯不散發為咽喉之疾或內生瘡狀如肉腐窒塞不通吐咽不下如單肉蛾雙肉蛾及痄腮腫脹甚者內外皆腫上攻頭面治宜先吐風痰以通咽膈然後解熱毒清肺胃遲則不救咽瘡喉痛多屬虛火血虛虛火遊行無制客於咽喉也虛者八味地黃湯加牛膝五味子煎與食前冷服實者黃連荊芥薄荷薑汁硝密噙化喉痛治用荊芥陰虛火炎上必用元參有用茜草一兩作一服者以其能降血中之火也喉與咽不同喉者肺脘呼吸之門戶主出而不納咽者胃脘水穀之道路主納而不出蓋咽喉司呼吸主升降此一身之緊關橐籥也經曰足少陰所生病者口渴舌乾咽痛咽腫上氣嗌乾素問云邪客於足少陰之絡令人咽痛不可納食又曰足少陰之絡循喉嚨通舌本凡喉痛者皆少陰之病但有寒熱虛實之分少陰之火直如奔馬逆衝於上到此咽喉緊鎖處氣鬱結而不得舒故或腫或痛也其症必內熱口乾痰涎湧上尺脈必數而無力蓋緣腎水虧損相火無制而然須用六味地黃湯如麥冬五味子大劑作湯服之又有色欲過度元陽虧損無根之火遊行無制客於咽喉者須用八味腎氣丸大劑煎成冰冷與飲引火歸原庶幾可救此論陰虛咽痛者如此治法正褚氏所謂上病療下也陰氣大虛虛火無制孤陽飛越客於咽喉遂成咽痛脈必浮大重取必澀去死則近人參一味濃煎細細飲之如作實症用以清降之藥禍在反掌遇謂人參必同童便製附子同煎溫和食前頓服則監製虛火下歸乃愈如單用人參細細飲之恐浮火益熾亦非穩當奈世人但知熱咽痛不知有寒咽痛也經曰太陽在泉寒淫所勝民病咽痛頷腫陳藏器用附子去皮臍炮製切片以蜜塗炙令蜜入內含咽其津甘味盡更易之仲景云下利清穀裡寒外熱脈微欲絶而面赤咽痛以通脈四逆湯又曰冬月伏寒在於腎經發則咽痛下利附子湯溫其經則愈又有司天運氣其年鄉村傳染若惡寒者多是暴寒折熱寒閉於外熱鬱於內忌膽凡酸寒之味點喉反使陽郁不伸又忌硝黃等寒藥下之反使陽陷入里禍不旋踵須用表散若甘桔湯之類又有咽痛而諸藥不效者此非咽痛乃是鼻中一條紅線如發懸一黑泡大如櫻桃垂挂到咽門而止難以探取宜用土牛膝根直而肥者搗取汁入醋四五滴再搗絞汁和前汁滴入鼻中二三滴即刻絲斷珠破吐出瘀血即安李東垣曰夏月傷寒伏於腎少經之經多咽痛者名曰腎經傷寒也宜熱藥冷飲之陳遠公曰咽喉乾燥久而疼痛人以為肺經之燥熱也孰知腎水涸竭乎夫肺金生腎水也肺氣清肅自下生水惟肺氣虛則肺液只可自養無如腎水大耗故欲救肺之乾燥必先救腎之涸也子母兩富湯熟地麥冬各五錢熟地加半亦可服一劑燥稍止三服疼稍止十服全愈夫咽喉之症有三十六種總不外乎風火痰初起不論緩急好歹只以下氣清痰為主次後清火涼血為要看明虛實虛火宜溫補腎水引火歸原為主若不分先後虛實混亂用藥非惟難以見功而且生死攸關大抵風熱者俱多陰虛者亦復不少火症者十之三寒症者十之一二醫者審其病由𠫵之時令探吐其痰針其少商穴風熱散之火甚者下之虛寒者溫之若初起驟用寒涼之藥則上熱未除中寒又生其毒邪乘虛而入即喘不休死不救矣凡喉症初起大便祕結者宜大黃元明粉下之則大便通而易痊若至五六日久而不食大便結祕用之立斃蓋病久元氣已虛豈宜再用硝黃當有善法以處之凡生長膏粱素耽於酒色勞心過度以致咽喉臭痛人以為肺氣傷也誰知乃心火太盛移熱於肺乎夫飲酒傷胃胃熱熏蒸宜乎肺熱矣然胃火熏肺而胃土實生肺也故飲酒尚不傷肺惟勞心過度則火起於心而肺受刑矣胃火助之則火旺炎上而咽喉成燔燒之路自然唾涕稠黏口舌乾燥氣味腥臭而痛矣蓋心主五臭入肺為腥臭矣解腥湯主之解腥湯甘草桔梗生地麥冬貝母各五桑皮天冬丹皮各三黃芩一水煎服二劑痛止四劑臭除此方治肺而兼治心又兼治胃者也因膏梁之人心肺之氣血原虛下滋二經之氣血但瀉其火則胃之氣血必傷反增火之焰矣妙在補肺以涼肺補心以涼心補胃以清胃火自退舍不止喉痛而喉痛自止也傷寒病四五日發熱鼻乾口燥咽痛者陽明自病也陽明屬胃汗多則胃汁干故津液不能潮咽乾痛者宜用人參敗毒散傷寒三五日咽喉中腫其色鮮紅痰涎自出頭痛項強須知屬太陽邪氣入於經絡觸動心間積熱之毒攻咽則咽喉腫痛宜甘桔湯加牛蒡子元參川連三味傷寒八九日已上身無潮熱腹痛自利而咽喉痛者此太陽經受病也傷寒得汗已不解轉入太陰腹滿時痛自利而咽喉腫其色微白此症可治用真武湯主之所謂真武者能補下元助陽正氣以手足和暖為妙經曰但要口中紅活有痰可治宜隨症加減用藥若口中黑則血已枯乾聲啞目上視汗出者不能治矣切宜仔細看症傷寒八九日已上得汗已不散咽喉痛舌乾唇燥者此少陰經自病也太陰經受病得汗後未解傳入少陰經少陰屬腎汗多則腎汁干其腎水不能潮潤咽喉故其病也如自利腹中痛於足厥冷咽中腫痛不可吞咽如無涎唾吐及舌上乾者不治病人八九日已上身微熱無他症但喉中痛而無腫聲啞者不治傷寒十餘日已上得汗已病解無潮熱脈平靜而咽喉痛者此餘毒上攻也宜用黏子解毒湯陰毒傷寒身體重背強眼痛不堪任小腹急痛青黑毒氣衝心四肢厥冷噁心吐逆咽喉不利脈沉細若能速治調醫數十日內可痊否則難生男婦咽喉痛法則一般惟女人喉中有腫而色紅者此月經不調也經不能行則壅塞於上故咽腫痛也蓋由榮衛不和但男子以氣為主女人以血為主男婦各隨其氣血之分調治宜調榮湯可也如病勢重其色微白腳者此虛陽上攻宜降氣湯探吐痰涎及吹藥婦人有孕心頭痛者不治婦人傷寒身熱或發潮熱咽痛者此經行也活人書云婦人傷寒經水適來晝則明瞭入暮則譫語如見鬼神狀此乃熱入血室無犯胃氣及上二焦不可下也小柴胡湯主之今咽喉痛而潮往來面赤唇紅者此熱邪上壅也不用小柴胡湯宜用竹葉石羔湯清上膈除心煩所以為妙次用四物湯喉中有瘡其色帶紅者黃色者探痰再吹藥宜鼠黏子解毒湯咽喉間生肉層層相疊漸漸腫起有孔出臭氣用真枸橘葉煎湯頻頻服之而愈要煎濃汁虛陽上攻氣不升降致結患咽嗌痰涎壅寒治以蘇子降氣湯主之喉腫乃毒氣起於脾經因食煎爆油膩等物及飲酒太過而行房事以致毒氣不能流行聚結於喉根若不速治潰毒閉急即死先用針法吐法最妙咽喉之病近世最多者有數症曰單乳蛾雙乳蛾曰子舌脹木舌脹纏喉痹走馬喉痹其極氣上行轉於喉之兩旁近外結腫以其形似是為乳蛾一為單二為雙也其比乳蛾差小者為喉痹熱結舌下復生小舌名曰子舌脹結熱於舌中舌為之腫名曰木舌脹木舌者強硬而不柔和也熱結於咽喉腫繞於外且麻且癢腫而大者名纏喉風痹暴發痰涎湧盛水漿不入然名雖不同總不外乎手少陰君火手少陽相火為病也二脈並絡於喉氣熱則內結結甚則腫脹甚則痹痹甚則不通而死矣其危者可以咸軟之而大者以辛之如薄荷烏頭殭蠶朴硝白礬之數用之自可消除至於走馬喉痹則非此所療以其生死只在反掌之間耳急救之法無如砭針出血血出則病已此上策也後之患者萬勿畏針以自斃其命後之君子萬勿執小方而曰吾藥不動臟腑又妙於不用針砭出血在小疾幸而獲愈而大疾必致死亡特為拈出以告病者醫者祈勿自誤而誤人也咽喉為人身飲食之門戶呼吸關隘方寸之地受病危險其症甚繁大約總歸於火蓋少陰少陽君相二火其脈皆絡於咽喉故往往為火症之所結聚君火勢緩則結而為疼為腫相火勢速則腫甚不仁而為痹痹甚不通而痰塞以死經云一陰一陽結謂之喉痹火者痰之本痰者火之標火有虛實之火實火因過食煎炒炙爆蘊結積毒其症煩渴二便祕塞風痰上壅將發喉痹必先胸膈不利脈弦而數治宜先去風痰後解熱毒虛火或因飲酒過度或因忿怒或因色欲火炎上攻咽喉乾燥必二便如常少脈微治宜補虛瀉火凡用藥不宜純用寒涼取效目前上熱未除中虛復起毒氣乘虛入腹胸前高腫上喘下瀉手足指甲青黑七日以後全不進飲食口如魚口者死且治咽喉最忌發汗針砭出血已屬發汗之意何堪更發其汗凡傷寒於腎及帝丁喉名腫者斷不宜針至如內傷虛損咽喉失音無法可治喉症初起一日寒戰即生髮者發後身涼口不碎又無重舌或二便俱利不可認作熱症皆因陰氣虛寒而發其痰不可吊盡此痰即身內之津液所化與熱症乳蛾重舌之痰壅一處以流盡則毒愈者不同若亦流盡則精神竭而必斃先宜藥吹或用水換之法使喉一通即便服藥初劑發散和解次即施溫補滋養設三四日再發寒戰或心痛骨痛脅痛等症皆屬難治咽喉發時牙關緊閉舌喉俱腫口碎而臭或有重舌及舌上有黃屑者發後下午再發寒熱二便閉塞者即作熱症用石羔敗毒散主之然亦易愈之症如漸起三四日後再寒熱者雖極凶亦不為害惟有症未減而牙關反不緊閉唇口不腫紋如好人者不治舌腫滿口者不治色如胡桃如茄子如砂紙者不治若連重舌發寒熱者猶可治也舌以筋按之若色雪白起筋紫紅色者此身內血已死然口若臭猶可生尤忌口渴氣急痰多而稠如桃膠者死期已速又曰一頸俱紅腫者亦極危也面帶紅紫面青帶白神氣少者俱無救不語者死略能語者尚可有生之機面色少神喜坐低處者亦難治帝丁喉也乃性命攸關舌系下通於腎白腫不治傷之者死凡喉症至五日即重三日前症雖重尚未成膿藥能清散若至五六日患處多成膿隨便穿破後爛成窩為難治用口疳藥吹多加龍骨珍珠凡吹喉症須吹藥四五管方得痰多三次可以全愈其出痰初吹宜多用金丹必直對帝中吹之急提出管恐痰即嘔出也婦人喉症腫痛有因經閉致火上攻而成者宜內服通經藥月事通則愈凡喉中無形紅腫者當用燈心凡喉症凶者面發腫白亮無光彩脈微沉無力是神氣外泄無陽之症斷乎不治若面發紅腫脈來洪大有力症雖極重是有元氣火盛治之易痊凡吹喉症欲出痰涎藥中用皂角末少許三黃解毒湯黃連黃芩黃柏梔子清胃湯生地升麻連翹丹皮黃連引火湯熟地五元參五萸肉四茯苓四山藥四五味二肉桂一白芥子三敗毒散牛蒡子花粉元參黃柏薄荷丹皮銀花熟石羔赤芍甘草竹葉燈心犀角解毒丸治小兒諸瘡毒及痧後餘毒喉齒等症犀角朴硝元參牛蒡茯苓生地連翹青黛桔梗甘草共研細末蜜丸如龍眼大薄荷湯下硃砂為衣冰硼散毋論新久咽喉口齒腫毒及久嗽痰火咽啞作痛日吹三四次元明粉硼砂各五錢硃砂六分冰片五分柳花散治吹喉瘡及口舌生瘡走馬牙疳咽喉腫痛蒲黃黃柏青黛人中白各一兩硼砂五錢冰片五分生肌散痧痘口瘡破腐臭爛黃連地骨皮黃柏五倍子生甘草各等分共研細末乾燥若仍作熱作膿而不即愈者乃內毒未盡也仍用大連翹飲二聖散痧痘咽喉腫痛不拘初起回後殭蠶二苦參三研細末吹入三四次即腫消痛止回生救苦上清丹治咽喉十八種急症殭蠶一錢硝尖煆硝尖硼砂各五分明礬枯凡各一分冰片一分海螵蛸三分共研極細末每用少許吹上吐去痰涎即愈赤麟丹治喉痹喉風喉蛾喉癰七十二症如神明礬二兩好血竭二錢巴豆仁二十一粒硼砂二錢冰片一錢用傾元寶罐一個入明礬血竭於罐內放巴豆仁於凡內炭火上煆令煙盡冷定加硼砂冰片研細末收貯每用少許吹之咽喉危症野蕎麥春間初發紅嘴形類海棠六七月間可長四五尺其葉莖頗似海棠節有紅節葉大如掌每採鮮葉搗汁入醋一匙以棉或雞羽蘸掃涎出即活單雙喉蛾單雙蛾皆標病也其患生於咽旁或單或雙其咽門雖腫半塞半開其病雖凶而喉道又寬又腫雖重無妨宜金鎖匙吐出痰涎推蕩積熱經曰宜針烙單雙肉蛾可針即針有不可針者亦用吹藥劫藥吐去風痰以圖捷效次服煎劑蓋急症難於久待也腫於咽喉兩旁為雙蛾易治腫於一邊為單蛾難治如有惡寒表症用荊防敗毒散散之不惡寒而無表症者惟有辛涼清利外用雞毛蘸米醋探喉中去盡痰涎復以雞羽探吐之令著實咯破蛾中紫血即潰或用紫金錠磨下即安慎勿輕用刀針古方有巴豆油染紙作捻子點火吹滅以煙燻鼻流涎牙關自開再用此搐患處即愈有重輕者或日重夜輕治之尤易用山豆根桔梗各三錢甘草半夏各一錢治之一劑立愈症認得真對症用藥則驗單蛾者其形圖小如筋頭生於咽喉關上或左或右雙蛾則兩邊俱生也若生於關下為難治左咽主吞咽右喉主出聲咽門分兩路其受病不同雙蛾風此症有兩枚在喉間兩邊如豆大急將黃虀汁蜜少許加元明粉漱出風痰吹冰片散乳蛾有單雙有連珍多因酒色鬱結而發單輕雙重初起一日痛二日紅腫三日有形如細白星發寒熱者凶四日勢定治之四五日可愈其症生於喉旁一邊生者單蛾左右生者雙蛾二白星上下相連如纏袋者連珠也雙單蛾湯水不下看頭頂發內細有窠桃破出血即刻開關煎土牛膝根汁時時咽之吹金鎖匙散冰硼散治乳蛾先用碧丹五金丹一吹次用金丹二碧丹三同吹出痰兼用煎劑左加犀角黃連右加赤芍藥柴胡連珠兼用之大便閉加元明粉大黃及吹藥並用乳蛾由肺經積熱受風凝結而成生咽喉兩旁狀如蠶蛾有單有雙雙者輕單者重生於關前形多易見吹藥易到手法易施故易治生於關後難見形色吹藥不到手法難施故難咽喉左畔虛陽上攻其腫微紅名單乳蛾若肺氣不舒外症手足厥冷痰涎自出頭重目昏急用虀菜醋汁加元明粉灌之旋出痰涎吹藥如厥重不省人事氣欲絶者急以吳茱萸研爛醋調塗足心右畔虛陽上攻其色微黃其症亦手足厥冷其形若蠶繭故謂之乳蛾陰虛雙蛾之症用附子一錢鹽水炒成片用一片含在口中立時有路可以用湯藥矣後以八味地黃丸一兩白湯送下立時而愈雙蛾陰症最難治而最易治也不知其竅則最難知其法則最易豫常為人治此症用附子一枚鹽水煮取一片含口中而火勢立止然後以六味地黃丸大劑飲之不再發神方也附子或用蜜浸炙將一片含口中亦效一鹽味一甜味皆可有病雙蛾者人以為熱也喉門腫痛痰如鋸泄不絶茶水一滴不能下咽豈非熱症然而痛雖甚至早少輕喉雖腫舌必不燥痰雖多必不黃而成塊此乃假熱之症也若以寒涼之藥急救之下喉非不暫快少傾而熱轉甚人以為涼藥之少也再加寒涼之品服之更甚急須刺其少商穴出血少許喉門必有一線之路開矣急以附子一錢熟地一兩山茱萸四錢茯苓五錢麥冬牛膝五味各三錢煎服下喉一聲響亮其火勢熱症立時消散蓋少陰之火直如奔馬凡人腎火大耗者元陽不能下藏蓋無水以養火而火必上越也日日衝上而咽喉口小不能任其出入乃結成腫痛狀似雙蛾實非雙蛾也方中妙在附子辛熱之藥引龍雷之火下藏於窟宅夫龍雷之火乃相火也喜水而不喜火故藥中熟地萸肉之類純是補陰之味使火有所歸而不再沸此因其逆勢而引導之也按喜水而不喜火喜水者喜其真陰之水也而非寒涼之水不喜火者不喜邪熱之火也而非辛熱之火凡人有咽喉忽作腫痛生雙蛾者飲食不能下五日不食即死矣但此症實火易治而虛火難治實火世人已有妙方芩連之類治之立消惟虛火乃腎火不藏於命門浮遊於咽喉之間其症亦如實火惟夜重於日清晨反覺少輕若實火清晨反重夜間反輕實火口燥舌乾而開裂虛火口不甚渴舌滑而不裂也以此斷之決不差錯此種虛痛若亦以治實火之法治之是人已下井而又益之石也故不特不可用寒涼並不可用發散蓋虛火必須補也然徒補腎水雖水能制火可以少差而火勢太盛未易制伏又宜於水中補火則引火歸原而火勢頓除有消亡於傾刻矣方用引火湯主之一劑而痰聲靜痛頓除腫亦盡消二劑全愈蓋熟地萸肉五味之類純是補腎水聖藥茯苓山藥又益精而利水助肉桂之下行元參以消在上之浮火白芥子以消壅塞之痰上焦既寬而下焦又得肉桂之熱則龍雷之火有不歸根於命門者乎一劑便生真有鬼神莫測之機又勝於八味地黃湯也倘喉腫閉塞勺水不能下咽雖有此神方將安施乎更有妙法用附子一個破故紙五錢各研末調如糊作膏布攤如膏藥貼足心中央烘之一時辰喉即寬而開一線路可以服藥又不可不知此妙法也陰蛾之症乃腎水虧乏火不能藏於下乃飛越於上而喉中關狹火不得直泄乃結成蛾似蛾而非蛾也早晨痛輕下午痛重至黃昏而痛更甚得熱則快得涼則加其症之重者滴水不能下喉若作外感陽症治誤用山豆根芩連梔子之類則痛益益甚而關不開有不盡命而死者也惟單補陰虛用引火歸原之而痛頓失也治以化蛾湯主之此方大補腎之水不治蛾之痛壯水則火息引火則痛消可收全功誠奇絶之法也咽喉腫痛日輕夜重長成喉蛾宛如陽症但不甚痛喉咽自覺有一錢之乾燥至飲水咽入稍快至水入腹而又不安吐痰如水甚多將涎投入水中即化為水人以為喉痛生蛾投瀉火之方不特不驗反增其重亦有勺水不能入者何也蓋屬陰蛾也陰蛾則日輕夜重陽蛾則日重夜輕此乃腎少陰腎水下無可藏之地直上炎於喉也治法宜大補腎水加入補火之味引火歸原下熱則上自寒引火湯主之熟地三兩巴戟天麥冬各一兩茯苓五錢五味二錢水煎服一劑火下喉腫全消二劑全愈按此方以熟地為君大補腎水麥冬五味重滋肺金金水相資子母有旁沱之沛水旺足以制火加入巴戟天之溫又是補水之藥則水火既濟水趨下而火不得不隨之又加茯苓前導則水火同趨共安腎宮如琴瑟之和矣何必用桂附大熱引火歸原乎然桂附為引火歸原之聖藥胡棄不用不知此症因水之不足而火沸騰今用大熱雖引火於一時必耗水於日後所以只用巴戟天引火而又補水則腎無乾燥之虞喉有清肅之益也人有感冒風寒咽喉腫痛其勢甚急變成雙蛾者其症痰涎稠濁不時口渴索飲疼痛水不能入喉此陽火壅阻咽喉勢若重而病實輕也夫陽火太陽之火也膀胱之火也膀胱之火與腎火為表裡膀胱火動腎火即來相助故直衝咽喉而脾肺胃之火亦復相從上升於是借三經之痰涎盡阻塞於咽喉結成火毒而不可解治法似宜統治數經矣然其本實始於太陽泄膀胱之火則諸經之火自安但咽喉地近於肺太陽既假道於肺肺經險要之地即狹路之戰場也安有舍戰場要地不解其圍而先搗其本國乎貴有兼治之法也清燥湯桔梗元參花粉各三錢甘草二錢白芍五錢山豆根柴胡麻黃各一錢水煎服一劑喉寬二劑蛾盡消矣按此方散太陽之邪者居四散各經之邪者居六尤加意於散肺邪者由近以及遠也人一時咽喉腫大作痛吐痰如湧口渴求水下喉少快已而又熱索水喉成雙蛾既大且赤其形宛如雞冠此喉痹症即俗稱纏喉風也乃陰陽二火兼熾也一為少陽相火一為少陰君火今二火齊發其勢更暴喉管細小火難遽泄遂遏抑其間初化腫而後成蛾也蛾有二名雙蛾單蛾也雙蛾生二枚兩相壅擠中間反留一線之隙可通茶水藥食尚可下咽若單蛾則獨形反塞住水穀之路往往有勺水不能入者藥物既不可咽又從何路以進藥哉先用刺法一則刺少商等穴尚非捷徑惟用刀直刺喉腫之處一分則喉腫必少消可用吹藥開之吹藥方牙皂燒灰膽凡牛黃冰片各一分射香三釐共為細末吹喉中必大吐痰而愈後用煎劑名救喉湯元參一兩麥冬五錢花粉三錢山豆根甘草射干各一錢水煎服立效若雙蛾但刺少商穴不用刺喉法用此二方自效按元參為君是瀉心腎君相之火佐以豆根射干花粉祛邪消痰則火自歸經咽喉之關隘肅清矣雙單蛾吹藥方火硝一錢五分硼砂五分雄黃一分冰片三釐共研細末吹入喉中吐出痰涎或從鼻孔吹入亦可吹喉方人指甲不拘多少明礬三錢大蜘蛛一個同入銀罐內煆研末加冰片一分吹之塞鼻方巴豆肉細辛等分研末用棉包好左蛾塞右邊鼻孔右蛾塞左邊鼻孔喉蛾喉痹喉風並治發背疔瘡烏龍爪即白花菜曬乾研細末一錢加冰片三五釐研勻吹之如發背疔瘡取葉搗爛敷上即消喉蛾兼治口疳杉木皮煆存性人中白兒茶各三錢珍珠琥珀甘石青黛各一錢冰片六分研細末吹喉疳喉蛾牙疳先用黃連甘草薄荷松蘿茶各一錢煎水漱淨再吹再看耳後左右如有紅筋以針刺出血立愈雙單喉蛾喉癬喉癰腫痛吐咽不下命在須臾鳳凰衣橄欖核煆存性兒茶各等分研細末吹喉疳喉蛾牙疳等症每一錢加冰片五釐吹之即效無比乳蛾急症也此方甚效有力者宜預製以救人此方不費多錢慎毋輕視臘八日雄豬膽一個裝入白礬末陰乾之後研末再入臘八日豬膽內如此三四次如遇患者用一二分吹之神效奇方青魚膽一個納糯米七粒懸避陰處四十九日收下單蛾用一粒雙用二粒放舌下含之咽津土牛膝搗取汁不時咽下煎取汁代茶最妙咽喉雜症喉間腫長如瓜蒂者不可刺破則傷人鹽煆赤研末以雞羽蘸搽即消咽喉間生肉層層相疊漸漸腫起起有孔出臭氣用臭橘葉煎湯頻服即愈喉癰當結喉生又名猛疽以其毒勢猛烈可畏也屬任脈及手太陽手少陰經積熱憂憤所致若過時不治穿潰咽嗌者死癰發於嗌中名曰猛疽不治化為膿膿不得瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日而已喉癰生於結喉之間名海門第一關最為惡毒乃心肝火炎於脾肺毒氣攻喉切忌刀針咽喉紅腫瘀塞作痛此屬標病膿出自愈當以金鎖匙吐出痰涎推蕩積熱膿脹痛者開之喉癰不放膿者非法喉癰生於咽外正中腫痛妨礙飲食紅腫發熱如必欲潰膿軟而脹痛者針之內服補託之劑玉紅膏搽貼其肌完口有腐潰內通湯水隨孔出曾治數人俱亦無妨積熱喉癰其腫如黃糖李上面紅絲外症項上痛齒痛此胃經受熱胃氣通於喉嚨故患喉癰先吐痰次吹藥加元明粉煎藥加當歸黃耆倍片芩喉癰此毒因七情鬱結而成毒生喉間若不速治恐毒氣內攻喉骨若潰必致口內出膿雖不傷命即成冷瘻終身之痼疾也喉癰雖腫而咽門半塞半閉其病雖凶而喉道又寬又緊此皆凶症雖無妨喉癰因過食辛辣炙爆厚味醇酒感熱而發屬肺喉間無形但紅腫而痛虛者亦發熱四五日可愈治喉癰用碧丹加金丹少許吹之內服膏子藥或煎藥舌䨿舌喉癰肥人感熱性燥者多患此症凡舌下生如小舌者為舌䨿舌連喉腫痛即發癰大抵兼者勢凶如患舌䨿舌喉癰若大便祕煎藥內加元明粉大黃小便不利加六一散舌䨿舌喉癰用加減犀角地黃湯舌用金丹吹舌根及兩旁莫間斷喉用碧丹十金丹五頻頻吹之喉菌屬憂鬱血熱氣滯而生婦人多患之狀如浮萍略高而厚紫色生於喉傍輕則半日二十日重者月餘要在治之得法患者守戒忌口喉菌初用藥碧丹五金丹二後用金丹三碧丹三吹之更須頻服膏子藥不可間斷喉乃性命呼吸之門不可輕忽喉中起疳若不早治一二日間死生干係輕則緩重則急宜涼膈解毒凡喉間作痛潰爛久而不愈此必楊梅瘡毒須以萆薢湯為主隨症加添別藥過橋疳生咽喉之下肺管之上看之不見吹藥不到飲食妨礙此楊梅結毒於肺胃也喉瘤生於喉間兩旁或單或雙形如無眼大血絲相果如瘤故名之此乃肺經受熱多語損氣或怒中高喊或讀書太急或多飲燒酒或多食炙爆須要斂神晏息以藥攻之則此症脫然矣不可用刀針點破喉瘤生於喉間兩旁或單或雙亦有頂大蒂小者凡怒氣喊叫犯之則痛不犯不痛喉節此喉生於鳩尾之中初起如梅核在喉膈之間吐不出咽不至三日漸上喉節之間名曰喉節其疾須用刺破後用膽硝丹吹入喉中再用雄黃化毒丹七粒服之梅核氣乃痰氣結於喉中咽之不下吐之不出如茅草常刺作癢初則吐酸妨礙久則閉塞不通即此候也痰氣結塊在喉中如梗狀者梅核氣宜噙化丸金匱云婦人咽中有如炙臠半夏厚朴湯主之炙臠乾肉也咽中貼貼如有炙肉吐之不出吞之不下此病不因腸胃故不礙飲食二便不因表邪故無骨疼寒熱乃為積寒所傷不與血和血中之氣溢而浮於咽中得水濕之氣凝結難移男子亦間有之鎖喉瘡者乃心經毒氣小腸邪風發於聽會之端注於懸膺之側初生如癧瘰不能飲食閉塞難通漸次腫破化膿早治得生宜服當歸連翹之類用冰片散蜒蝤不拘多少加冰射搗搽天白蟻瘡乃咽喉內生瘡鼻孔俱爛也此症方書不載多有不識常作喉風醫最為誤事此乃肺脾蘊毒而成宜用穿山甲散喉癬即肺花瘡之類喉癬乃虛火上炎肺金太旺致攻牙關生如哥窯絞樣又如秋葉背後紅絲飲食陰礙咽痛雖不至殞命久則咽喉失音不救喉癬用碧丹吹不時服膏子藥再服煎劑加大貝母下氣守戒一陰虛咳嗽久之喉中痛者必有瘡名曰肺花瘡用坎離湯加元參桔梗甘草不可用冰片藥吹恐辛散瘡轉潰也凡痰火勞咳嗽傷咽痛者無法可治喉生肺花瘡即俗謂喉生魚鱗刺也難救喉刺多因先患勞病重症既多虛火上升榮血已枯其喉上齶有紅點密蜜如蚊蛋咬者死勿治人有生喉癬於咽門之內以致喉痛其症必先作癢面紅耳熱而不可忍後則咽唾隨覺乾燥必再加咽唾而後快久則成形作疼變為楊梅絲瘰或疼或癢而為癬矣夫癬必有蟲在咽喉之地此因腎水之耗以致腎火上衝而肺金又燥兼治殺蟲以治癬庶幾正固邪散蟲可盡掃也化癬神丹主之繼以潤喉湯喉疳方百草霜一錢兒茶五分冰片少許共研細末日吹四五次喉疳口疳牙疳降香一錢珍珠三分琥珀三分白芷三分乳香去油沒藥去油五倍子血竭各五分冰片一分射香五分牛黃一分竹葉上吊挂繭蠶連蟲收取陰乾研末日吹三四次咽喉結毒成疳久不收口剪去頭尾蛇蛻一條壁錢七個冰片三分將蛇殼瓦上煆存性研細末吹之壁錢要連蟢子炙用喉爛祕方槐花三錢兒茶黃連懷牛膝各一錢上為細末夏月西瓜水調服冬月生梨汁服或丸如緑豆大每服三丸喉爛奇效珍珠一錢硃砂三分冰片一分研勻極細吹之奇效異常又可作服藥又可點眼亦可生肌長肉清瘤碧玉散硼砂三錢膽凡冰片各三分研細以筋蘸點之梅核氣噙化丸膽凡硼砂明礬牙皂雄黃各等分上為末紅刺肉蒸爛為丸如芡實大空心含化一丸溫黃酒一杯過口內服蘇子降氣湯驗方枚瑰花去淨蒂心浸火酒飲愈陳愈妙噙化丸痰氣結核在咽喉中不能出入栝蔞仁杏仁海石桔梗連翹各一兩朴硝四錢研末薑汁和蜜水如櫻桃大含咽之半夏厚朴湯半夏川朴茯苓紫蘇葉生薑專治婦人七情之氣鬱滯不散結成痰涎或如梅核在咽咯之不出咽之不下或中脘痞滿氣不舒暢或痰飲中滯嘔逆噁心並可取效蓋半夏降逆厚朴散結生薑茯苓宣至高之滯而下其濕蘇葉味辛氣香色紫性溫能入陰和血則氣與血和不復上浮也蘇子降氣湯蘇子半夏前胡川朴當歸橘紅肉桂加薑煎一方無桂有沉香沉香能升降諸氣溫而不燥穿山甲散治天白蟻瘡白霜梅一個燒存性枯凡一錢炙山甲雄黃各五分共研細末吹喉立效化癬神丹喉癬元參麥冬各一兩白蘇子白薇甘草牛蒡紫菀各一錢百部三錢白芥子一錢水煎服二劑疼少止又四劑癬蟲盡死換潤喉湯潤喉湯喉癬熟地麥冬各一兩苡仁五錢桑白皮生地各三錢山萸肉四錢貝母甘草各一錢水煎服十劑癢痛悉除方中再加肉桂飢服為善後之計萬舉萬全也祕方黃牛糞以瓦蓋屎周圍用炭火煆盡存性研末日吹五六次含化丸牛黃冰片各一分硼砂兒茶雄黃各八分山豆根二錢膽凡三分鹽梅三個共研細末將陳白梅肉入藥和勻丸如龍眼大臨臥含口中咽津有人生楊梅瘡愈後結毒於咽喉之間漸成喉癬如蝦蟆皮形破腐刺痛百藥弗效有人傳方用梅花點舌丹五六粒同牛黃二分研細吹入喉中三四次一日而愈喉風纏喉風者熱積於內腫繞於外且麻且癢腫而大也治療之法微者可以咸軟之大者可以辛散之或去風痰或解熱毒如腫甚藥不能下者以藥灌鼻中令吐之外以拔毒之藥敷之熱退腫消為吉竇氏曰纏喉風屬痰熱咽喉裡外皆腫者是也外面無腫者必身發熱面赤此乃熱毒之氣極也外面有腫者身亦發熱邪火發出於外也或牙關不強外面不腫但喉中紅者曰暴感邪熱在心如左邊病退傳右邊此餘毒未盡故也咽喉有數症有積熱有風熱有客熱有病後餘毒未除變化雙乳蛾者且如病中喉間有腫紅色數月其光似鏡者此積熱也且如喉中有腫其色微白其形若臂者此風毒喉痹也此熱毒因而感風相搏而發故也或咽中有腫其色帶紫色者此乃客熱謂其人暴感熱毒之氣壅於咽間或有傳變木舌者皆心熱蘊積於胸中故口中痰臭須用木通元參生地黃芩黃連山梔等涼品為要吹以冰片散纏喉風外症如蛇纏頸身發潮熱頭目大痛其症腫如紫糖色內症其腫紅絲白色腫塞不見咽下急用雞羽蘸燈窩內濁油攪去痰涎三四碗方活如痰不能去不治啞瘴風乃風痰犯於咽嗝之間因此口不能言牙關不開急用蟾酥磨水滴入鼻中即開隨用桐油滴入喉中仍將雞羽攪喉間風痰出盡再用甘草湯解桐油之氣如苦面紫舌青唇黑鼻流泠涕爪甲俱青目中多淚俱不治弄舌喉風此症啞不能言舌出常將手拿急將兩手大脂內側爪甲縫即少商穴用針每指刺二三針有血可治或每指里側外側皆針之再用燈窩油或桐油攪吐痰涎服雄黃化毒丹五六丸清茶下纏喉風因腎經有熱內枯不能上潤致令心火強盛故發此症如喉間雷響者不可治嗆食喉風此症因熱毒在於心經咽喉燥而無痰若嗆食者不可治如久不治變為飛絲勞毒能傷人命腳跟喉風此症腳跟發起至於喉間或一年發一次半年發一次切忌熱物不得傷於怒氣其病一日行一穴至七日行七穴雖然不妨只是要發用吹藥服敗毒藥如腫惡發泡者死纏喉風因心中急躁而發先二日必胸膈氣緊出氣短促忽然咽喉腫痛手足厥冷頸項不能轉側熱結於內腫擾於外且麻且癢喉內紅絲纏繞手指甲白手心壯熱喉腫而大風痰壅盛聲如曳鋸是其候也最為急症初起一日夜目直視喉中如雷聲不治燈火近患人口吹滅者不治若喘急額汗危在旦夕也纏喉風用桐油探吐或吹藥吐痰後而腫不消或人事不知者急用針刺患處以去惡血即蘇纏喉風用金丹碧丹等分頻頻吹之針法吐法內服煎劑下藥雄黃化毒丹方見前酌進勿遲遲則不救一男子患纏喉風內外皆腫藥不能下余以疏風清熱藥時刻灌之外以陽起石燒研同伏龍肝等分和勻新汲水調掃百遍三日熱始退腫治消鎖喉風萬年青搗汁和滴醋含漱纏喉風麻油調白礬末和雞子白灌之探吐燈窩油和漿灌之探吐土牛膝根搗汁和醋灌之土牛膝扁柏葉水浸搗取汁大半碗加牛乳一酒杯和勻吞數口二三次即松白礬細末五分烏雞蛋一個調勻灌喉中立效喉風生艾葉搗汁灌下如喉中壅開不能灌入鼻孔內灌入立刻開關多年溺壺垢半盞蜜五匙灌下亦立開關急喉風皂角捶碎擂水灌下取吐即不吐亦安巴豆仁綿紙包塞鼻孔中立通雄黃一塊水磨急灌得吐而安朴硝一兩細細含咽纏喉風桐油以雞羽掃入喉中探吐再用遠志細末水調敷項外巴豆仁三粒明礬約二三兩以銀罐煆枯取黏巴豆之凡研細吹喉番木鱉一個冰片二分研末吹入喉中蛇床子燒煙燻喉中即流涎開關如神金鑰匙纏喉風喉閉痰涎壅口噤不開湯水不下焰硝一兩五錢月石五錢雄黃二錢殭蠶一錢冰片二分五釐研細末吹喉中吐痰百靈丸喉中結塊不通水食者百草霜研細末煉蜜為丸約一錢水化灌下吹喉散短頭髮五錢雄黃五分明礬一錢蟢蛛窩三十個連蟢蛛更好入罐內煆存性研末吹咽喉奎光祕傳咽喉口齒合藥法玉丹此藥預先多制愈久愈好將明礬指頭大指塊者入罐內放炭上化開以筋試看罐底無塊時隨投火硝如凡一兩下硝三錢為則月石每凡一兩下月石三錢為則少頃又投明礬化盡又下月石如前法逐層投完待罐口鋪地如饅頭樣方用武火煉至乾枯用淨瓦蓋罐口一時取起將研細牛黃少許用水五六匙調和以匙挑滴丹上時罐仍入火內烘乾即取起連罐覆淨地上下以紙襯上用瓦蓋七日貯聽用制黃柏法揀好黃柏切片用荊芥為君甘草佐之煎濃汁浸軟攤瓦上緩緩炙黃不可令焦灑白蜜湯驪乾研末聽用制燈心法白色燈心先用水灑潮以小竹筒將燈心塞令堅緊竹筒兩頭用紙塞實入火緩緩燒過去竹筒塞紙開看如燒不過則生如燒太過則無有矣制須得法為妙制豬牙皂法取堅小不蛀豬牙皂放瓦上火炙脆去兩頭研末聽用制硝法入金丹者火硝以溫湯蘸過綿紙挹干包好放灶上洞內五六日收其濕氣入玉丹內不必如此合碧丹法玉丹三分百草霜半匙燈心灰一釐甘草末三匙薄荷葉末三分研極細末後入梅片五釐多些亦可再研勻收貯勿泄氣此丹宜臨用旋合不可出三日不可過陰雨天春夏多加薄荷其色青秋冬多加玉丹其色白欲出痰加牙皂少許合金丹法火硝二錢生蒲黃四分殭蠶末一分豬牙皂末一分冰片一分和研成淡黃色此藥可以久留冰片俟臨用時加按金丹功主消痰消腫並治牙酸舌䨿舌穿牙疔毒專用此丹一切咽喉等症則兼用碧丹看症輕重加減如症重者再加牛黃於本方內如喉腫症及喉風加殭蠶牙皂輕者只用硝與蒲黃蓋碧丹消痰清熱解毒驅風固為良方尚屬平緩不如金丹消腫毒除風熱開喉閉出痰涎最為神效但喉症初起金丹不宜多用因其透直入內且善走散初起若多用之恐輕症不勝藥力反扦格難入也凡喉症及單雙蛾只用碧丹其他重症金碧兼之須分先後多寡初起碧丹九金丹一吹五管後碧丹八金丹二再吹碧丹七金丹三如症重者碧丹金丹各半用至三五次後痰涎必上湧然後金丹六碧丹四將管直入喉中重吹一次隨後收出管即吊出痰竟用金丹八碧丹二亦可膏滋藥法薄荷為君玉丹為臣川貝為佐燈心灰百草霜甘草冰片為使先將玉丹百草霜研如後入燈心灰再研再入薄荷甘草川貝研極細末方入冰片研蜜調服凡喉癰喉癬喉菌等症須時時噙咽之症重則兼藥及吹藥漱藥方山豆根夏枯草松蘿茶嫩菊花蘇薄荷各等分煎湯頻漱附一捻金治小兒風痰吐沫氣喘咳嗽肚腹膨脹不思飲食切不可作喉風治喘爭者痰氣盛也兒肺脹喘嗽多人看作喉風大黃檳榔二牽牛人參大黃分兩等勾五味研成細末蜜水調量稀稠每將一字下咽喉不用神針法炙上其症肺脹喘滿胸高氣急兩脅搖動陷下作坑兩鼻竅脹悶鼻扇亂嗽咳聲嗄不鳴痰涎壅塞俗云馬脾風若不急治死於旦夕亦不可作緊喉風治如藥配不及用巴豆肉一粒搗爛作以棉花包扎男左女右塞鼻痰即墜下再服一捻金認為喉風則死慎之人皆不識故序於喉風門內庚寅治驗白喉風數症危險者附録小紅十四歲隆慧徒孫也三月十二日咽痛昏睡遂請友人診視用消風敗毒藥亦平淡無奇一連三四日咽喉頸項內外皆腫喉中白腐高凸舌上苔黑如墨其刺如針唇口亦腫而破耳聾見鬼神氣昏迷胡言亂語渾身灼熱皮膚紅赤似乎有疹隱約無汗大小便不通又請友人來診驚駭無措推辭不治束手無策待斃而已隆慧忽然醒誤知為熱病隨用紫雪丹三四錢徐徐灌下大便下黑糞水半桶小便亦通神氣漸清嗌乾口渴時飲冷梨甘蔗汁刻不能離延至二十一日余從寶應回揚診視詳審外形細察脈情是疫氣傳染十日之內不死命也幸能納稀粥數匙胃氣尚存病雖危險尤可醫治人未知實火之為患隨用龍膽黃連木通之苦寒犀角石羔知母生地之甘寒將熱毒由上焦引至中下焦從大小腸膀胱而出均是苦寒甘寒之藥連服半月咽喉白腐脫落漸淨飲食大進忽然一項右小核日大外用敷藥貼之其塊愈敷愈大十日腫大如碗余曰此遺毒也洗去敷貼之藥日飲銀藤膏代茶其腫漸消頸項自能回顧兩月而痊余曰藥醫不死病信不誣也魏右咽喉腫漫色白高凸疼痛不能咽唾腹中飢餓異常口渴咽乾水亦難下已有五日余視之是時發白喉風症也雖病在垂危過七日不能救矣閲其所服之方荊防兼溫散之味致使渙散其毒毒邪深入於裡何異優容養姦殊不知疫厲之傳染其邪氣由鼻而入熱毒凝結臟腑非用峻劑以去火毒不能勝任先按各穴針刺咽喉痛減使其吃麵一碗服雄黃解毒丸四粒大便下利按服苦寒甘寒重劑是夜竟能安睡矣此火已成燎原之勢不能不用猛藥重劑如畏重劑而用輕劑仍是杯水車薪於病奚濟藥分二日服完白亦漸脫十日而痊僧文峰頭疼發熱惡寒偏身骨節亦痛無汗頸項內外皆腫喉內兩旁色白而凸咽中乾燥舌苔灰色口渴唇裂頭面渾身至足紅赤如火日夜疼痛煩躁一刻不能安寧是疫厲傳染之症諸醫皆云不治余曰實火症也用風燥之藥誤矣先用針法次用吐法接服化毒丹下利黑水方用大劑苦寒甘寒是夜汗出如洗渾身疼痛自覺見松此大病用重劑膽怯則誤病矣連用五劑身常帶汗口渴亦解改用輕劑十日已能出外行走矣方三少周歲小兒寒熱大作啼哭煩躁不克寧息喉內白腐高凸痰氣壅寒喉間氣喘苔黑唇焦口渴身上手心灼熱如火肌膚中隱約似乎有疹隆慧視之膽怯不敢用藥余曰疫厲傳染之症照古法治之先用吐法探吐痰涎碗許喘平繼用針法服解毒丸方以苦寒甘寒大劑火毒下行四五日內汗出而啼哭定始安經云火方是也雖周歲小兒有是病必須用是藥一疑而用則遲矣服藥五日汗出熱退白腐已脫改易輕劑撤盡餘毒半月而痊方觀察頭疼發熱惡寒無汗咽喉白腐高凸疼痛皮膚中似乎隱約紅疹渾身骨節亦痛咽乾口渴時飲舌苔灰色煩躁坐臥不安是時發白喉風症隨用針法吐法服解毒丸四粒大便下行方用苦寒甘寒重劑連服五貼汗出遍身鬆動白退十日而痊金桂圓周二之女於十月初三日夜晚來厲診視咽喉拖下腫大而白上中兩關腫滿白腐高凸頭疼惡寒發熱無汗咽燥口渴唇裂痰涎上湧口中漫出疼痛異常開口氣鼻難聞是感天時疫厲之氣所發白喉風症也來勢凶險乃毒氣初作於內尚未服藥而氣未開寒毒未渙散先用針法吐法次服化毒丹至天明汗出熱退身涼惟手心獨熱囑其再吐一次吃麵一碗余思疫厲之毒實火症也臟腑積熱已久若用平淡之劑豈非優容養姦勢大難制故不得不用重峻之劑將臟腑凝積之熱毒由上焦引至中下從大小腸膀胱而出現已十日守方未動喉嚨上中兩關白腐漸脫咽喉白腐脫下如殼一樣並未損壞帝丁口中氣味亦無將方易換輕劑銷盡餘毒以免愈後別生枝節藥用當而通神信不誣也前人之方無不對症用之不當每不應手抑或醫者用而病家亂不敢服亦屬誤事念病家深信不疑實萬幸也錦和魚行張大之女來厲視余咽喉腫滿白腐高凸寒熱交作無汗嗌乾口渴似春間白喉風同餘曰非針法不救病者畏針余隨用吐法及化毒丹至二十一日喉中滿白疼楚非常口內氣臭腹飢咽不能下痰涎上湧不能吐出氣漸上逆形勢欲閉余曰非針不生命備面一大碗余按古制以針各穴針後覺喉間鬆動移時竟將面吃下余又令服化毒丹四粒隨立方以苦甘寒之品用之第思白喉風實乃火疫之症臟腑積熱已久如用平淡瀉火之藥徒投無益非以峻劑不可將內腑凝結熱毒由上焦引至大小腸膀胱而出未滿半月喉中白腐漸脫口中臭味亦無渾身有汗飲食暢進余將方更易輕劑飲之毒微盡尚未屏除余令再服數貼以杜後患余憶咽喉系納穀之區豈能阻滯生死攸關之所朝不待夕若非余矢志苦心立方未易對症略書數則為證庶不以余之徒負虛沽名耳藥方歌括針法諸般急症利舌根兩邊青筋刺再向少商穴上施放出惡血真奇祕雄黃解毒雄飛淨鬱金曬研巴豆並米醋煎濃和作丸溫湯送下攻急症龍虎二仙膽草犀芩連膏地母蠶梔木通元勃藍根蒡引用大青粳米宜除瘟化毒葛芩佳蠶地蟬梔通貝加山豆粉甘桑葉入白喉初起用無差又有神功辟邪散蠶蟬葛地貝冬芩連翹通勃銀花蒡能使白喉重者輕神仙活命膽黃芩蟬地蠶膏土茯苓通貝車前銀馬勃只須數劑著奇能回生萬應丹冰竭牛黃乳石珍珠列連柏兒茶黛芷硼鬱金粉草薄荷末急症開關散有功醋磨木鱉汁須濃牙齦舌底天花板次第塗之立即通血竭冰硼散最神兒茶元麝與雄精殭蠶甘草元明粉吹入喉中保太平救急異功散法靈斑蝥竭蠍麝香冰乳香沒藥元參共貼向頸間有泡生瓜霜散取人中白珠砂明雄冰片列共研細末頻頻吹調治喉症是真訣石青消毒膽礬加山豆冰硼大劈砂膏黛元明與中白頻吹喉內自然佳退腐蚰蜒闢毒散鹽梅陳者兩相宜搗融蘸水頻塗患消腫還能退白皮蜘蛛救苦最為良炒焙蜘蛛冰片襄呼吸不通難下藥頻危獲此保無傷乳蛾紅腫膽礬散中白還同指甲和研細頻頻吹患處能開堵塞見功多硇砂散法破蛾稱礬石青鹽二物明蛾子單雙及喉閉此方功效立能憑蒜泥拔毒散尤良取穴經渠細審詳水泡起時針剔破拔除惡毒自安康清心滌肺地蠶芩天麥二冬貝母尋花粉柏甘並知母酌加玉竹與條參養正湯推玉竹先芍苓二地首烏聯女貞山藥天花麥腐退之初用此煎銀花四君子交濟參朮苓烏甘草繼引用冬桑葉最良脾胃素虛養榮衛附沈青芝先生驗方一則張渭漁兄痢疾後多日不便腹中疼痛痙厥交至服沈青芝先生方得燥屎甚多其病遂愈其方白蘿蔔三斤取汁去渣六安茶五錢泡濃汁去渣再入白蜜五錢生薑淨汁五錢陸續涼服
