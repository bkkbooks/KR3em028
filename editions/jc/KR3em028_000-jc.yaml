front:
  text: 小序此卷為溧陽沈青芝先生所贈青芝具活人術與予交十年見其治疾無不應手而效喉科尤為擅長每詢其法必有所選則唯應不肯以視予日者或謂予曰僕老矣僕之喉科一法非君所欲見而未得者乎因授余以此卷且曰僕之一生心血盡在於斯稽古以來喉症一科不乏奇方名論然皆有驗有不驗加以汗牛充楝好學之士欲窺門徑而不得一失之偏為害匪細此卷所列論方皆出自師傳或由古書及經歷而得百試百驗有益世者不少君曷公之同好俾初學者得以入門而高明者愛而指謬也時維光緒辛已孟秋定遠方燕昭伯融識於邗上寓圓之溫翠軒青芝自序喉證之凶險者當針則針不可亂針當吐則吐不可妄吐性命攸關死生立見苟不識其標本而治之則禍不旋踵矣余細閱各大家喉科其凶險者不外喉痹喉風纏喉風白喉風爛喉痧陰虛喉嚨等症死而不救者年年有之而旱荒尤甚乾隆五十四年秋間曾時行白喉風症北直最多咸豐六年此症南北大行醫者多不識為何證因憶經云肺屬金其色白肺為相傳之官嬌嫩之藏無論少壯老小值以夏月不雨之天覆感陰濕之氣如枯木日久發菌故生此症所以服風燥之藥不救惟用清潤之劑得生每見有不服藥而亦得生者若誤服藥則難醫其症初起頭痛惡寒發熱喉中色白凸起身熱手心中如火一團肌膚似乎隱約痧疹紅點身熱干亢無汗煩躁刻不能安或有頭面渾身皮膚紅赤如火嗌燥舌乾苔黑唇口焦裂喉中疼痛難忍牙關係鎖湯水難下但有汗可以得生尚須細察面色五行生剋辨明脈情寒熱虛實立方用藥然方出於古人予閱張君之用龍虎二仙湯即古人之龍膽瀉肝湯白虎湯普濟消毒飲犀角地黃湯黃連解毒湯數方化出惟除去升提辛溫風燥酸澀之品故十難之論大可為後學之法也光緒辛已年方觀察伯融曾同餘集各大家喉科三十六種其中症之虛實以及用藥並吐法針法均以備細詳明庚寅季春白喉風症時行而邗江尤甚城鄉患者不一而足竟至朝發夕死傳染者不可勝屈十八之中得其生者抑不過二三人而已余由實應旋邗始知白喉風症時行生者竟屬寥寥予實為慘目與道光歲皖江一帶時疫爛喉痧稍異較之尤險余自幼至壯精習岐黃數十年來無論寒暑日為之不輟恨未克得窺全豹至於喉嚨之症余尤加講習惜乎未得精微之奧細審喉嚨延五穀出納之區人命之攸關豈可忽略而言之餘力心勵精研治亟學毫髮不容間斷數年朝思夕索力心求治活人之法不辭心勞力瘁日以專工集成喉科數十餘種分門別證絲髮無謬予不敢秘密以宣於世可謂救人之實筏云爾觀察方公以白鏹視余購閱余曰實非沽名於世延濟人之誠心耳鎮揚一帶患白喉風者來余處就治者十得生其七八踵門而求購者亦屬不少余辭不受余曰實非漁利而設不過以公於世故不揣譾陋及將巳驗略摘數條列後併名之曰喉科集腋分為上下二卷余願鐘鳴鼎食之家明哲之士更正付諸梨棗實而藏之抑可為裨益於世也夫歲光緒庚寅仲冬瀨江後學沈青芝謹識於廣陵橘井山房
