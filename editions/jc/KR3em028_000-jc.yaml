body:
  text: 針法凡遇喉痹纏喉白喉痧單雙蛾風火喉之重者服藥不退心中惡逆精神困備昏迷不醒言語錯亂疼痛難忍以針於舌根底下兩邊青筋白喉風之重症切不可刺中間之青筋刺入以分許為度放出惡血涼水漱盡再刺少商穴系手大指甲盡處側邊離甲一分即是用力從臂順拉而下至大指尖止連拉四五十下拉至大指以針向穴上先刺內邊後刺外邊捻出惡水男先左女先右兩手皆刺如蛾子腫大亦用刺針出血惟每月初五日人神在口忌刺蛾子舌根下初六日人神在手忌刺少商穴十五日人神在遍身均不可刺少商穴手太陰肺經在手大指內側去爪甲一分以針刺之留一呼出針商陽穴手陽明大腸經在手食指內側去爪甲角一分針一分留一呼出針中衝穴手厥陰心包絡經在手中指端去爪甲一分中陷一分留三呼出針關衝穴手少陽三焦經在手無名指外側去爪甲角一分針一分留三呼出針少衝穴手太陽小腸經在手小指內側去爪甲角一分針淺出針頰車穴足陽明胃經在耳下八分曲頰端向前中陽側臥開口有空處耴之針三分出針曲池穴手陽明大腸經在肘外脯骨屈處橫紋頭中陷以手拱胸耴之針五分留七呼出針合谷穴手陽明大腸經在手大指食指岐骨間中陷針三分留六呼出針逐日血神所在不宜針灸一日在足大指二日在外踝三日在股內四日在腰五日在口六日在手七日在內踝八日在腕九日在尻十日在腰背十一日在鼻柱十二日在髮際十三日在牙齒十四日在胃腕十五日在遍身十六日在胃十七日在氣衝十八日在股外十九日在足二十日在外踝二十一日在手小指二十二日在踝二十三日在肝及足二十四日在手陽明二十五日在足陽明二十六日在胸二十七日在膝二十八日在陰二十九日在膝脛三十日在足跗刺針圖式用藥禁忌竊古有少陰甘桔湯治咽痛又仲景少陰病下利咽痛心煩者豬膚湯少陰病二三日咽痛者可與甘草湯不差者與桔梗湯少陰病咽中傷生瘡不能語言聲不出者苦酒湯少陰病咽中痛半夏散及湯主之數方皆清利咽喉之要藥今人見有喉症不審其源即用之而無疑嗟乎此猶抱薪救火也非能愈其疾而且更加其病何以言之夫今時咽喉之症皆寒火不均或受天時不正之氣風火之毒上攻須以去風瀉火為要甘草補中而不瀉火中宮既受其補則火愈熾於病亦重桔梗能引諸藥上行藥既上行其痰火與氣亦引之而上行則喉間壅塞於病更重故小兒驚痰大人風痰痰火桔梗所以忌也本草云升麻可代犀角引胃氣上升似乎可用不知氣一上行必挾痰火以俱上湧塞於咽喉間四肢厥冷喘急異常為害非淺若在他症猶或可用鎖喉風服之則必不救故猶當切忌之也半夏雖消痰之妙藥若咽喉症痰重者誤用之則傷生命蓋半夏能消脾胃之寒痰非能消肺中之熱痰故也生薑辛辣發散然喉症亦不以發散為主用之則以火益火亦不宜用此數味關係喉症甚重不可不明言而謹戒之至他藥中亦有禁忌者是在臨時時留意焉可也
